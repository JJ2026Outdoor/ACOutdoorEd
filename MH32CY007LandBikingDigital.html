const AudioRecorder=({onSave,disabled=false})=>{
  const [state,setState]=useState("idle");
  const [secs,setSecs]=useState(0);
  const mrRef=useRef(null);
  const chunksRef=useRef([]);
  const timerRef=useRef(null);
  const start=async()=>{
    if(disabled)return;
    setState("requesting");
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      const mr=new MediaRecorder(stream);
      mrRef.current=mr; chunksRef.current=[];
      mr.ondataavailable=e=>{if(e.data.size>0)chunksRef.current.push(e.data);};
      mr.onstop=()=>{
        stream.getTracks().forEach(t=>t.stop());
        const blob=new Blob(chunksRef.current,{type:"audio/webm"});
        const reader=new FileReader();
        reader.onload=ev=>{onSave(ev.target.result,"recording.webm");setState("idle");setSecs(0);};
        reader.readAsDataURL(blob);
        setState("saving");
      };
      mr.start(); setState("recording"); setSecs(0);
      timerRef.current=setInterval(()=>setSecs(s=>s+1),1000);
    }catch(e){setState("idle");alert("Microphone access denied.");}
  };
  const stop=()=>{
    if(mrRef.current&&mrRef.current.state==="recording")mrRef.current.stop();
    clearInterval(timerRef.current);
  };
  const fmt=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
  if(disabled)return null;
  if(state==="idle")return(
    <button onClick={start} title="Record audio answer"
      style={{display:"flex",alignItems:"center",gap:6,padding:"4px 10px",background:BLUE_LT,
        border:`1px solid ${BLUE}`,borderRadius:6,color:BLUE,fontSize:12,cursor:"pointer",marginTop:4}}>
      <svg width="12" height="12" viewBox="0 0 24 24" fill={BLUE}>
        <path d="M12 1a4 4 0 0 1 4 4v7a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-1 17.93V21H9v2h6v-2h-2v-2.07A8 8 0 0 0 20 12h-2a6 6 0 0 1-12 0H4a8 8 0 0 0 7 7.93z"/>
      </svg>
      Record audio
    </button>
  );
  if(state==="requesting")return <span style={{fontSize:12,color:MG,marginTop:4,display:"block"}}>Requesting microphone...</span>;
  if(state==="recording")return(
    <button onClick={stop}
      style={{display:"flex",alignItems:"center",gap:6,padding:"4px 10px",background:RED_LT,
        border:`1px solid ${RED}`,borderRadius:6,color:RED,fontSize:12,cursor:"pointer",marginTop:4,
        animation:"pulse 1.2s infinite"}}>
      <span style={{width:8,height:8,borderRadius:"50%",background:RED,display:"inline-block"}}/>
      Stop — {fmt(secs)}
    </button>
  );
  if(state==="saving")return <span style={{fontSize:12,color:MG,marginTop:4,display:"block"}}>Saving...</span>;
  return null;
};

const TA=({value,onChange,rows=4,ph="Write your answer here...",disabled=false,recordings,onAddRecording})=>{
  const hasRec=recordings&&recordings.length>0;
  return(
    <div>
      <textarea style={{width:"100%",padding:"10px 12px",border:`1px solid ${disabled?"#e5e7eb":BD}`,
        borderRadius:6,fontSize:14,lineHeight:1.6,fontFamily:"inherit",
        background:disabled?"#f9fafb":"white",color:disabled?MG:"#1A1A1A",minHeight:rows*28}}
        value={value||""} onChange={e=>!disabled&&onChange(e.target.value)}
        placeholder={disabled?"":ph} readOnly={disabled} rows={rows}/>
      {!disabled&&onAddRecording&&(
        <AudioRecorder disabled={disabled} onSave={(b64,name)=>onAddRecording({b64,name,id:Date.now()})}/>
      )}
      {hasRec&&(
        <div style={{marginTop:6,display:"flex",flexDirection:"column",gap:4}}>
          {recordings.map((r,i)=>(
            <div key={r.id||i} style={{display:"flex",alignItems:"center",gap:6,
              padding:"4px 8px",background:BLUE_LT,border:`1px solid ${ASSESSOR_BD}`,borderRadius:6}}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill={BLUE}>
                <path d="M12 1a4 4 0 0 1 4 4v7a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-1 17.93V21H9v2h6v-2h-2v-2.07A8 8 0 0 0 20 12h-2a6 6 0 0 1-12 0H4a8 8 0 0 0 7 7.93z"/>
              </svg>
              <audio controls src={r.b64} style={{flex:1,height:28}}/>

              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

          ph="Before the ride I carried out an M-Check which showed... I prepared my clothing by... I planned the route by..."
          recordings={data.recordings?.ac32_preparation||[]} onAddRecording={updRec("ac32_preparation")}/>
      </ACBox>
      {loFeedbackBox("LO3")}
    </div>
  );

  const renderLO4=()=>(
    <div data-wb-section="lo4">
      <LOHeader num="4" title="Be able to participate in a land-based activity" acs="AC 4.1"/>
      <KH title="Skills and Techniques on the Trail">
        {[["Body position","Maintain a neutral position on flat ground. Drop into attack position (lower body, weight back, elbows out) before technical sections and descents."],
          ["Climbing technique","Shift gears before the climb. Stay seated to keep rear tyre traction. Lean forward slightly. Keep a smooth, consistent pedal cadence."],
          ["Descent technique","Weight back and low, heels down, arms and legs absorbing bumps. Look ahead — where you look is where you go."],
          ["Cornering","Look through the corner, brake before entry, lean the bike. Outside pedal weighted and down. Smooth, controlled exit."],
          ["Obstacle riding","For roots and rocks: unweight the bike by lifting slightly with hands and feet, allowing the wheels to roll over. Do not brake on the obstacle."],
          ["Dynamic safety checks","Continuously monitor tyre condition, braking, and the terrain ahead. Stop and check the bike if you hear or feel something unusual."],
        ].map(([title,desc])=>(
          <div key={title} style={{padding:"7px 0",borderBottom:`1px solid #c8e6d4`,fontSize:14,color:"#1A1A1A"}}>
            <strong style={{color:DG}}>{title}:</strong> {desc}
          </div>
        ))}
      </KH>
      <ACBox id="4.1" text="Participate in a mountain biking activity using a range of skills and techniques, correct equipment, and appropriate safety checks.">
        <div style={{fontSize:13,color:MG,marginBottom:6}}>
          This criterion is primarily assessed by practical observation. Describe what you did during the ride — the skills you used, equipment you carried and wore, and safety checks you performed.
        </div>
        <TA value={data.ac41_participation} onChange={upd("ac41_participation")} rows={8} disabled={am}
          ph="During the mountain bike ride I used the following skills and techniques: ... I wore/carried: ... The safety checks I performed included: ..."
          recordings={data.recordings?.ac41_participation||[]} onAddRecording={updRec("ac41_participation")}/>
      </ACBox>
      {loFeedbackBox("LO4")}
    </div>
  );

  const renderLO5=()=>(
    <div data-wb-section="lo5">
      <LOHeader num="5" title="Be able to maintain equipment used during the land-based activity" acs="AC 5.1"/>
      <KH title="Post-Ride Bike and Equipment Maintenance">
        {[["Clean the bike","Rinse off mud with water. Use a soft brush on the frame, tyres, and cassette. Avoid high-pressure washing directly at bearings and seals."],
          ["Dry and lubricate chain","Dry the chain thoroughly after washing. Apply chain lube sparingly to each link, then wipe off excess. A clean, lubricated chain extends drivetrain life significantly."],
          ["Check and reinflate tyres","After a ride, tyres lose a small amount of pressure. Re-inflate to correct pressure before storage. Inspect for cuts, embedded stones, or wear."],
          ["Check brakes","Squeeze each brake lever — it should feel firm. Check brake pads for wear. Align pads with the rim or disc. Replace worn pads promptly."],
          ["Inspect frame and bolts","Check for cracks, dents, or damage to the frame. Tighten loose bolts (use a torque wrench if available). Check quick-releases or axles are secure."],
          ["Clothing and helmet","Hang wet kit to air-dry. Check helmet for cracks or damage — replace if it has been involved in a significant impact."],
        ].map(([title,desc])=>(
          <div key={title} style={{padding:"7px 0",borderBottom:`1px solid #c8e6d4`,fontSize:14,color:"#1A1A1A"}}>
            <strong style={{color:DG}}>{title}:</strong> {desc}
          </div>
        ))}
      </KH>
      <ACBox id="5.1" text="Maintain equipment used during the mountain biking activity.">
        <div style={{fontSize:13,color:MG,marginBottom:6}}>Describe how you maintained your bike and equipment after the ride. What did you clean, lubricate, check, or repair?</div>
        <TA value={data.ac51_maintenance} onChange={upd("ac51_maintenance")} rows={6} disabled={am}
          ph="After the ride I maintained my equipment by... I cleaned the bike by... I checked the brakes and found... I lubricated..."
          recordings={data.recordings?.ac51_maintenance||[]} onAddRecording={updRec("ac51_maintenance")}/>
      </ACBox>
      {loFeedbackBox("LO5")}
    </div>
  );

  const renderLO6=()=>(
    <div data-wb-section="lo6">
      <LOHeader num="6" title="Be able to assess own participation in the land-based activity" acs="AC 6.1"/>

        <div style={{fontSize:14,lineHeight:1.7,color:"#1A1A1A",marginBottom:10}}>A good self-assessment is specific, honest, and forward-looking. Reflect on:</div>
        {[["Technical riding skills","How confident were you on different trail features? Did your body position, braking, and cornering improve during the ride?"],
          ["Preparation","Was your bike ready? Did the M-Check reveal anything? Was your kit appropriate for the conditions?"],
          ["Safety","Did you stay within your ability level? Were you aware of hazards and risks on the trail?"],
          ["Fitness and stamina","How did your fitness affect your performance? Were there sections you found physically demanding?"],

          <div key={title} style={{padding:"7px 0",borderBottom:`1px solid #c8e6d4`,fontSize:14,color:"#1A1A1A"}}>

  const renderTasks=()=>(
    <div data-wb-section="tasks">

        Your assessor will observe you during the mountain biking activity. Written tasks below support your practical evidence.
        Where a criterion uses a plural, a minimum of TWO examples is required.
      </div>
      {[{id:"T1",ac:"AC 1.1",title:"Land-based Activities",instruction:"In LO 1, describe a minimum of TWO different land-based activities. For each, explain what it involves, where it takes place in Wales, and who might participate."},
        {id:"T2",ac:"AC 2.1–2.4",title:"Activity Requirements",instruction:"In LO 2, complete all four AC boxes: describe the features of mountain biking, assess your own skills, state the equipment needed, and state the safety requirements."},
        {id:"T3",ac:"AC 3.1–3.2",title:"Preparation",instruction:"In LO 3, describe how you selected your kit and prepared your bike. Your assessor may also observe your practical preparation including the M-Check."},
        {id:"T4",ac:"AC 4.1",title:"Practical Participation",instruction:"Participate in the mountain biking activity. Your assessor will observe your use of skills and techniques, equipment, and safety checks. Record your own account in LO 4."},
        {id:"T5",ac:"AC 5.1",title:"Equipment Maintenance",instruction:"After the ride, maintain your bike and equipment as directed. Your assessor will observe this. Record what you did in LO 5."},
        {id:"T6",ac:"AC 6.1",title:"Self-Assessment",instruction:"Complete the self-assessment in LO 6. Reflect honestly on your performance — what went well, what was challenging, and what you would improve."},

        <div key={t.id} style={{border:`1px solid ${BD}`,borderRadius:8,padding:16,marginBottom:12,background:"white"}}>
          <div style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:8}}>
            <span style={{background:DG,color:"white",borderRadius:12,padding:"2px 10px",fontSize:12,fontWeight:700,flexShrink:0}}>{t.id}</span>
            <span style={{background:LG,color:G,borderRadius:12,padding:"2px 10px",fontSize:12,fontWeight:600,flexShrink:0}}>{t.ac}</span>
            <span style={{fontWeight:700,color:DG,fontSize:14}}>{t.title}</span>
          </div>
          <div style={{fontSize:14,color:"#1A1A1A",lineHeight:1.6}}>{t.instruction}</div>
          {am&&(
            <div style={{marginTop:10,padding:10,background:ASSESSOR_LT,border:`1px solid ${ASSESSOR_BD}`,borderRadius:6}} data-wb-feedback="true">
              <div style={{fontSize:12,fontWeight:600,color:ASSESSOR_BG,marginBottom:4}}>Task feedback — {t.id}</div>
              <textarea value={data.task_feedback[t.id]||""} onChange={e=>update({task_feedback:{...data.task_feedback,[t.id]:e.target.value}})}
                rows={2} style={{width:"100%",padding:8,border:`1px solid ${ASSESSOR_BD}`,borderRadius:4,fontSize:13,fontFamily:"inherit"}}
                placeholder="Assessor feedback for this task..."/>
            </div>
          )}
        </div>
      ))}
      {am&&(
        <div style={{marginTop:24,padding:16,background:ASSESSOR_LT,border:`2px solid ${ASSESSOR_BD}`,borderRadius:10}}>
          <div style={{fontWeight:700,color:ASSESSOR_BG,fontSize:15,marginBottom:12}}>Overall Assessment Result</div>
          <div style={{display:"flex",gap:10,marginBottom:12}}>
            {["PASS","REFER","PENDING"].map(v=>(
              <button key={v} onClick={()=>update({overall_result:data.overall_result===v?"":v})}
                style={{padding:"8px 20px",borderRadius:8,fontWeight:700,fontSize:14,cursor:"pointer",
                  border:`2px solid ${v==="PASS"?G:v==="REFER"?RED:AMBER}`,
                  background:data.overall_result===v?(v==="PASS"?G:v==="REFER"?RED:AMBER):"white",
                  color:data.overall_result===v?"white":(v==="PASS"?G:v==="REFER"?RED:"#92400e")}}>
                {v}
              </button>
            ))}
          </div>
          <input type="text" value={data.assessorSig||""} onChange={e=>update({assessorSig:e.target.value})}
            placeholder="Assessor signature (type name)"
            style={{width:"100%",padding:"8px 12px",border:`1px solid ${ASSESSOR_BD}`,borderRadius:6,fontSize:14,fontFamily:"inherit",marginBottom:8}}/>
          <input type="date" value={data.markedDate||""} onChange={e=>update({markedDate:e.target.value})}
            style={{padding:"8px 12px",border:`1px solid ${ASSESSOR_BD}`,borderRadius:6,fontSize:14,fontFamily:"inherit"}}/>
        </div>
      )}
      <div style={{marginTop:24,padding:16,border:`1px solid ${BD}`,borderRadius:8,background:"white"}}>
        <div style={{fontWeight:700,color:DG,marginBottom:12}}>Student Declaration</div>
        <div style={{fontSize:14,color:"#1A1A1A",lineHeight:1.6,marginBottom:12}}>
          By signing below, I confirm that all work in this workbook is my own. I have not copied from another student or used someone else's work without acknowledgement.
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div>
            <div style={{fontSize:13,color:MG,marginBottom:4}}>Student signature:</div>
            <input type="text" value={data.studentSig||""} onChange={e=>update({studentSig:e.target.value})}
              placeholder="Type name as signature"
              style={{width:"100%",padding:"8px 12px",border:`1px solid ${BD}`,borderRadius:6,fontSize:14,fontFamily:"inherit"}}/>
          </div>
          <div>
            <div style={{fontSize:13,color:MG,marginBottom:4}}>Date:</div>
            <input type="date" value={data.declarationDate||""} onChange={e=>update({declarationDate:e.target.value})}
              style={{width:"100%",padding:"8px 12px",border:`1px solid ${BD}`,borderRadius:6,fontSize:14,fontFamily:"inherit"}}/>
          </div>
        </div>
      </div>
    </div>
  );

  const renderEvidence=()=>(
    <div data-wb-section="evidence">
      <h2 style={{fontSize:20,fontWeight:800,color:DG,borderBottom:`2px solid ${G}`,paddingBottom:8,marginBottom:16}}>Photo & Audio Evidence</h2>
      <div style={{padding:14,background:BLUE_LT,border:`1px solid ${ASSESSOR_BD}`,borderRadius:8,marginBottom:16,fontSize:14,lineHeight:1.6,color:"#1A1A1A"}}>

        For each item: write a brief description of what it shows or says, then tick the criteria it provides evidence for.

      {data.evidence_items.map(it=>(
        <div key={it.id} style={{border:`1px solid ${BD}`,borderRadius:8,padding:16,marginBottom:12,background:"white"}}>
          <div style={{display:"grid",gridTemplateColumns:"140px 1fr",gap:12}}>
            <div>
              <Thumb it={it}/>
              {!am&&(
                <label style={{display:"block",marginTop:6,padding:"5px 0",textAlign:"center",
                  background:LG,border:`1px solid ${G}`,borderRadius:4,cursor:"pointer",fontSize:12,color:G,fontWeight:600}}>
                  Upload photo/audio

            <div>
              <textarea value={it.desc} onChange={e=>patchItem(it.id,{desc:e.target.value})}

                style={{width:"100%",padding:"8px 10px",border:`1px solid ${BD}`,borderRadius:4,
                  fontSize:13,fontFamily:"inherit",marginBottom:8,resize:"vertical"}}

              <div style={{fontSize:12,fontWeight:600,color:DG,marginBottom:6}}>Evidence for:</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {ACS.map(ac=>(
                  <label key={ac.id} style={{display:"flex",alignItems:"center",gap:4,fontSize:12,cursor:"pointer",
                    padding:"2px 8px",border:`1px solid ${it.acs.includes(ac.id)?G:BD}`,
                    borderRadius:10,background:it.acs.includes(ac.id)?LG:"white",color:it.acs.includes(ac.id)?G:MG}}>
                    <input type="checkbox" checked={it.acs.includes(ac.id)} disabled={am}
                      onChange={e=>patchItem(it.id,{acs:e.target.checked?[...it.acs,ac.id]:it.acs.filter(x=>x!==ac.id)})}

                borderRadius:4,color:RED,fontSize:12,cursor:"pointer"}}>Remove</button>
          )}
        </div>
      ))}
      {!am&&(
        <button onClick={addEvidenceItem}
          style={{padding:"10px 20px",background:G,color:"white",border:"none",borderRadius:8,
            fontSize:14,fontWeight:600,cursor:"pointer",marginTop:4}}>

      {ACS.map(ac=>(
        <div key={ac.id} style={{display:"flex",alignItems:"flex-start",gap:12,padding:"10px 0",borderBottom:`1px solid ${BD}`}}>
          <input type="checkbox" checked={!!data.checklist[ac.id]} disabled={am}
            onChange={e=>update({checklist:{...data.checklist,[ac.id]:e.target.checked}})}
            style={{marginTop:2,width:18,height:18,accentColor:G,flexShrink:0}}/>
          <div>
            <span style={{fontWeight:700,color:G,marginRight:8}}>AC {ac.id}</span>
            <span style={{fontSize:14,color:"#1A1A1A"}}>{ac.text}</span>
          </div>

  const renderGlossary=()=>(
    <div data-wb-section="glossary">
      <h2 style={{fontSize:20,fontWeight:800,color:DG,borderBottom:`2px solid ${G}`,paddingBottom:8,marginBottom:20}}>Glossary</h2>

        <div key={term} style={{padding:"10px 0",borderBottom:`1px solid ${BD}`,display:"grid",gridTemplateColumns:"200px 1fr",gap:16}}>

          <div style={{fontSize:14,color:"#1A1A1A",lineHeight:1.5}}>{def}</div>
        </div>
      ))}
    </div>
  );

  const sectionMap={
    cover:renderCover, contents:renderContents, intro:renderIntro,
    lo1:renderLO1, lo2:renderLO2, lo3:renderLO3, lo4:renderLO4,
    lo5:renderLO5, lo6:renderLO6,
    tasks:renderTasks, evidence:renderEvidence,
    checklist:renderChecklist, glossary:renderGlossary,
  };

  return(
    <div style={{minHeight:"100vh",background:LGR}}>
      <div id="ev-cover-strip" style={{display:"none",padding:24,border:"2px solid black",marginBottom:24,pageBreakAfter:"always"}}>
        <div style={{fontWeight:800,fontSize:18,marginBottom:8}}>External Verification — Evidence Summary</div>
        <div style={{fontSize:14}}><strong>Unit:</strong> MH32CY007 — Participate in a Land-based Activity (Mountain Biking)</div>
        <div style={{fontSize:14}}><strong>Student:</strong> {data.studentName}</div>
        <div style={{fontSize:14}}><strong>Assessor:</strong> {data.assessorName}</div>
        <div style={{fontSize:14}}><strong>Centre:</strong> Brynllywarch</div>
        <div style={{fontSize:14,marginTop:8}}><strong>AC Status:</strong></div>
        {ACS.map(ac=>(
          <div key={ac.id} style={{fontSize:13,padding:"2px 0"}}>AC {ac.id}: {data.ac_status[ac.id]||"Not yet marked"} — {ac.text}</div>
        ))}
        <div style={{fontSize:14,marginTop:8}}><strong>Overall Result:</strong> {data.overall_result||"Pending"}</div>
        <div style={{fontSize:14}}><strong>Assessor Signature:</strong> {data.assessorSig}</div>
        <div style={{fontSize:14}}><strong>Date Marked:</strong> {data.markedDate}</div>
      </div>

      <div style={{position:"sticky",top:0,zIndex:100,background:am?ASSESSOR_BG:G,boxShadow:"0 2px 8px rgba(0,0,0,0.15)"}}>
        <div style={{maxWidth:900,margin:"0 auto",padding:"0 16px",height:60,display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{color:"white",fontWeight:800,fontSize:14,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>MH32CY007 — Land-based Activity</div>
            <div style={{color:"rgba(255,255,255,0.75)",fontSize:11}}>Mountain Biking · Agored Cymru Level 2</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <img src={LOGO_SRC} alt="Brynllywarch" style={{height:36,borderRadius:4}}/>
            <img src={AGORED_LOGO_SRC} alt="Agored Cymru" style={{height:32}}/>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
            {saved&&<span style={{background:"rgba(255,255,255,0.2)",color:"white",borderRadius:10,padding:"2px 8px",fontSize:11}}>Saved</span>}
            {am&&<span style={{background:"rgba(255,255,255,0.2)",color:"white",borderRadius:10,padding:"2px 8px",fontSize:11,fontWeight:700}}>ASSESSOR MODE</span>}
            <span style={{background:"rgba(255,255,255,0.2)",color:"white",borderRadius:10,padding:"2px 8px",fontSize:11}}>{pct}% complete</span>
            <button onClick={exportJSON} className="no-print" style={{padding:"4px 10px",background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.4)",borderRadius:6,color:"white",fontSize:12,cursor:"pointer"}}>↓ Save File</button>
            <label className="no-print" style={{padding:"4px 10px",background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.4)",borderRadius:6,color:"white",fontSize:12,cursor:"pointer"}}>

          </div>
        </div>
      </div>

      <div style={{position:"sticky",top:60,zIndex:99,background:am?ASSESSOR_BG:"white",borderBottom:`1px solid ${am?ASSESSOR_BD:BD}`,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
        <div style={{maxWidth:900,margin:"0 auto",padding:"0 16px",height:48,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{fontSize:13,color:am?"white":MG}}>{am?"ASSESSOR MODE — You are marking this workbook.":"Student mode — your answers are editable."}</span>
          {am?(
            <button onClick={()=>update({assessorMode:false})} className="no-print"
              style={{padding:"5px 14px",background:"white",border:"none",borderRadius:6,color:ASSESSOR_BG,fontWeight:700,fontSize:13,cursor:"pointer"}}>
              Exit Assessor Mode

          ):(
            <button onClick={()=>setShowPwModal(true)} className="no-print"
              style={{padding:"5px 14px",background:G,border:"none",borderRadius:6,color:"white",fontWeight:700,fontSize:13,cursor:"pointer"}}>
              Enter Assessor Mode

      {showPwModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:"white",borderRadius:12,padding:28,width:340,boxShadow:"0 8px 32px rgba(0,0,0,0.2)"}}>
            <div style={{fontWeight:800,fontSize:18,color:DG,marginBottom:16}}>Enter Assessor Mode</div>
            <input type="password" value={pwInput} onChange={e=>{setPwInput(e.target.value);setPwError(false);}}
              onKeyDown={e=>e.key==="Enter"&&enterAM()} placeholder="Assessor password"
              style={{width:"100%",padding:"10px 12px",border:`1px solid ${pwError?RED:BD}`,borderRadius:6,fontSize:14,fontFamily:"inherit",marginBottom:pwError?4:12}}/>
            {pwError&&<div style={{color:RED,fontSize:12,marginBottom:8}}>Incorrect password.</div>}
            <div style={{display:"flex",gap:10}}>
              <button onClick={enterAM} style={{flex:1,padding:"10px 0",background:G,border:"none",borderRadius:6,color:"white",fontWeight:700,fontSize:14,cursor:"pointer"}}>Enter</button>
              <button onClick={()=>{setShowPwModal(false);setPwInput("");setPwError(false);}} style={{flex:1,padding:"10px 0",background:"white",border:`1px solid ${BD}`,borderRadius:6,color:MG,fontSize:14,cursor:"pointer"}}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {showPrintModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:"white",borderRadius:12,padding:28,width:360,boxShadow:"0 8px 32px rgba(0,0,0,0.2)"}}>
            <div style={{fontWeight:800,fontSize:18,color:DG,marginBottom:16}}>Print Options</div>
            {[["full","Complete workbook"],["section","Current section only"],["ev","EV Summary sheet"]].map(([val,label])=>(
              <label key={val} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:`1px solid ${BD}`,cursor:"pointer"}}>
                <input type="radio" name="pm" value={val} checked={printMode===val} onChange={()=>setPrintMode(val)} style={{accentColor:G}}/>
                <span style={{fontSize:14,color:"#1A1A1A"}}>{label}</span>
              </label>
            ))}
            <div style={{display:"flex",gap:10,marginTop:16}}>
              <button onClick={()=>doPrint(printMode)} style={{flex:1,padding:"10px 0",background:G,border:"none",borderRadius:6,color:"white",fontWeight:700,cursor:"pointer"}}>Print</button>
              <button onClick={()=>setShowPrintModal(false)} style={{flex:1,padding:"10px 0",background:"white",border:`1px solid ${BD}`,borderRadius:6,color:MG,cursor:"pointer"}}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
