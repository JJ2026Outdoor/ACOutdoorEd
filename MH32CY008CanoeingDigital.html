const GLOSSARY=[
  ["Canoe","An open-topped paddle craft propelled with a single-bladed paddle, kneeling or sitting."],
  ["Water-based activity","Any activity that takes place on, in, or near open water."],
  ["Buoyancy aid","A flotation device worn during water activities to help keep a person afloat — mandatory for canoeing."],
  ["Capsize","When a canoe overturns in the water. All paddlers must know the correct self-rescue procedure."],
  ["Wet exit","The controlled process of exiting a capsized canoe underwater."],
  ["Eskimo roll","An advanced technique for righting a capsized kayak without exiting — not standard for open canoes."],
  ["Forward stroke","The basic paddle stroke that propels the canoe forward — blade fully submerged, torso rotation."],
  ["Reverse stroke","Paddling backward by reversing the forward stroke — used for stopping and manoeuvring."],
  ["Draw stroke","A sideways stroke that moves the canoe towards the paddle blade — used for positioning."],
  ["J-stroke","A corrective stroke used in solo canoeing to keep a straight course when paddling on one side."],
  ["Sweep stroke","A wide arc stroke used to turn the canoe in either direction."],
  ["Eddy","A calm patch of water behind a rock or obstruction where the current reverses."],
  ["Trim","The front-to-back balance of the canoe — affects how it tracks and turns."],
  ["Ferry glide","Crossing a current at an angle without being swept downstream."],
  ["Cold water shock","A physiological response to sudden immersion in cold water — can cause involuntary gasping and panic."],
  ["Throw line","A rescue bag containing a floating rope, thrown to a swimmer to pull them to safety."],
  ["NRW","Natural Resources Wales — manages waterways and issues guidance on safe use of Welsh rivers."],
  ["AALA","Adventure Activities Licensing Authority — regulates licensed outdoor activity providers in the UK."],
  ["Dynamic risk assessment","Continuous, real-time reassessment of hazards during the activity."],
  ["Exclusion zone","A defined area of water that paddlers must not enter — marked by buoys or signage."],
  ["Tow line","A rope system used to tow a swimmer or disabled craft to safety."],
  ["Spray deck","A cover fitted over the cockpit to prevent water entering — more common on kayaks than canoes."],
];

const AudioRecorder=({onSave,disabled=false})=>{
  const [state,setState]=useState("idle");
  const [secs,setSecs]=useState(0);
  const mrRef=useRef(null); const chunksRef=useRef([]); const timerRef=useRef(null);
  const start=async()=>{
    if(disabled)return; setState("requesting");
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      const mr=new MediaRecorder(stream); mrRef.current=mr; chunksRef.current=[];
      mr.ondataavailable=e=>{if(e.data.size>0)chunksRef.current.push(e.data);};
      mr.onstop=()=>{
        stream.getTracks().forEach(t=>t.stop());
        const blob=new Blob(chunksRef.current,{type:"audio/webm"});
        const reader=new FileReader();
        reader.onload=ev=>{onSave(ev.target.result,"recording.webm");setState("idle");setSecs(0);};
        reader.readAsDataURL(blob); setState("saving");
      };
      mr.start(); setState("recording"); setSecs(0);
      timerRef.current=setInterval(()=>setSecs(s=>s+1),1000);
    }catch(e){setState("idle");alert("Microphone access denied.");}
  };
  const stop=()=>{if(mrRef.current&&mrRef.current.state==="recording")mrRef.current.stop();clearInterval(timerRef.current);};
  const fmt=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
  if(disabled)return null;

    <LOH num="3" title="Be able to prepare for participation in a water-based activity" acs="AC 3.1 – 3.2"/>
    <KH title="Preparing for a Canoeing Session">
      {[["Buoyancy aid fitting","Put on the buoyancy aid and fasten all clips. Check it cannot be pulled up over your shoulders — if it can, it is too loose. Adjust all straps until snug."],["Helmet fitting","Sit level on the head, one to two finger-widths above the eyebrows. The chin strap should be firm but not uncomfortable."],["Wetsuit","Pull on before arriving at the water's edge. Check seals at neck, wrists, and ankles. Report any tears or damage."],["Paddle check","Run hands along the paddle shaft and blade. Check for cracks, sharp edges, or loose fittings. Confirm blade angle is correct."],["Canoe check","Check the hull for cracks. Confirm buoyancy bags are in place (for river use). Check painter lines (ropes at bow and stern)."],["Safety briefing","Attend the full safety briefing. Confirm you understand: capsize procedure, whistle signals, exclusion zones, and emergency action plan."]].map(([k,v])=>kv(k,v))}
    </KH>
    <ACBox id="3.1" text="Select the correct equipment and resources required for the canoeing session.">
      <div style={{fontSize:13,color:MG,marginBottom:6}}>Describe how you selected your equipment — what did you choose and how did you check it was suitable and correctly fitted?</div>
      <TA value={data.ac31_equipment} onChange={upd("ac31_equipment")} rows={6} disabled={am} ph="I selected the following equipment for the session: ... I checked the buoyancy aid by... I selected this paddle because..." recordings={data.recordings?.ac31_equipment||[]} onAddRecording={updRec("ac31_equipment")}/>
    </ACBox>
    <ACBox id="3.2" text="Prepare for participation in the canoeing activity.">
      <div style={{fontSize:13,color:MG,marginBottom:6}}>Describe how you prepared — include equipment checks, fitting, the safety briefing, and any other preparation steps.</div>
      <TA value={data.ac32_preparation} onChange={upd("ac32_preparation")} rows={6} disabled={am} ph="Before the session I... I attended the safety briefing and learned... I fitted my buoyancy aid by... I checked the canoe by..." recordings={data.recordings?.ac32_preparation||[]} onAddRecording={updRec("ac32_preparation")}/>
    </ACBox>
    {loFB("LO3")}
  </div>);

  const renderLO4=()=>(<div data-wb-section="lo4">
    <LOH num="4" title="Be able to participate in a water-based activity" acs="AC 4.1"/>
    <KH title="Skills and Techniques for Canoeing">
      {[["Forward stroke","Reach forward, fully submerge the blade close to the hull, rotate the torso to drive the stroke, exit before the blade reaches the hip. Switch sides regularly in tandem paddling."],["Reverse stroke","Reverse the forward stroke — place the blade behind you and push forward. Used for stopping and reversing."],["Draw stroke","Reach out to the side, place the blade in the water parallel to the hull, and pull the canoe toward it. Used for moving sideways."],["Sweep stroke","A wide, arcing stroke used to turn the canoe. Forward sweep turns away from the paddle side; reverse sweep turns toward it."],["Eddy turns","Using an eddy (calm water behind an obstacle) to stop, rest, or change direction. Requires confident paddling and reading of the current."],["Safety checks on the water","Continuously monitor the group's position relative to each other, the bank, and any defined hazards. Report any concerns to the instructor immediately."]].map(([k,v])=>kv(k,v))}
    </KH>
    <ACBox id="4.1" text="Participate in a canoeing activity using a range of skills and techniques, correct equipment, and appropriate safety checks.">
      <div style={{fontSize:13,color:MG,marginBottom:6}}>This criterion is primarily assessed by practical observation. Describe what you did during the session — strokes used, techniques practised, equipment worn, and safety checks performed.</div>
      <TA value={data.ac41_participation} onChange={upd("ac41_participation")} rows={8} disabled={am} ph="During the canoeing session I used the following strokes and techniques: ... I wore the following equipment: ... The safety checks I performed or participated in included: ..." recordings={data.recordings?.ac41_participation||[]} onAddRecording={updRec("ac41_participation")}/>
    </ACBox>
    {loFB("LO4")}
  </div>);

  const renderLO5=()=>(<div data-wb-section="lo5">
    <LOH num="5" title="Be able to maintain equipment used during the water-based activity" acs="AC 5.1"/>
    <KH title="Post-Session Equipment Maintenance">
      {[["Canoe","Rinse with fresh water to remove silt, mud, and salt (if sea paddling). Check hull for new cracks or damage. Store upside down or on a rack, out of direct sunlight (UV degrades plastic)."],["Paddle","Rinse thoroughly. Check blade and shaft for cracks or loose fittings. Store horizontally or hanging — do not lean against walls under load."],["Buoyancy aid","Rinse with fresh water. Check all fastenings and foam panels. Hang to dry naturally — never tumble dry or place near direct heat."],["Helmet","Rinse and inspect for cracks — particularly after any impact. Check chin strap. Replace immediately if damaged."],["Wetsuit","Rinse inside and out with fresh water. Hang on a wide hanger to dry. Do not leave in direct sunlight or in a compressed bag."],["Throw line","Repack after every use — fold the rope cleanly back into the bag so it is ready for immediate deployment. Check rope for damage."]].map(([k,v])=>kv(k,v))}
    </KH>
    <ACBox id="5.1" text="Maintain equipment used during the canoeing activity.">
      <div style={{fontSize:13,color:MG,marginBottom:6}}>Describe how you maintained equipment after the session. What did you rinse, check, dry, or store?</div>
      <TA value={data.ac51_maintenance} onChange={upd("ac51_maintenance")} rows={6} disabled={am} ph="After the session I maintained the equipment by... I rinsed the canoe by... I checked the buoyancy aid by... I stored..." recordings={data.recordings?.ac51_maintenance||[]} onAddRecording={updRec("ac51_maintenance")}/>
    </ACBox>
    {loFB("LO5")}
  </div>);

  const renderLO6=()=>(<div data-wb-section="lo6">
    <LOH num="6" title="Be able to assess own participation in the water-based activity" acs="AC 6.1"/>
    <KH title="How to Assess Your Own Participation">
      {[["Paddle technique","How accurate and effective were your strokes? Did you use torso rotation? Were you able to steer confidently?"],["Safety awareness","Did you stay within the designated area? Were you aware of hazards? Did you follow all safety instructions?"],["Confidence on water","How did your confidence develop during the session? What affected it — positively or negatively?"],["Teamwork","How well did you work with your tandem partner or within the group? Did you communicate effectively?"],["Areas for development","What specific skills do you want to improve? What would you do differently in a future session?"]].map(([k,v])=>kv(k,v))}
    </KH>
    <ACBox id="6.1" text="Assess your own participation in the canoeing activity.">
      <div style={{fontSize:13,color:MG,marginBottom:6}}>Write a detailed self-assessment. Be specific — refer to particular moments, strokes, or sections of the session. Include what went well and what you would improve.</div>
      <TA value={data.ac61_assessment} onChange={upd("ac61_assessment")} rows={10} disabled={am} ph="During the canoeing session I performed well at... I found it challenging when... My confidence on the water was... I think I could improve by... Next time I would..." recordings={data.recordings?.ac61_assessment||[]} onAddRecording={updRec("ac61_assessment")}/>
    </ACBox>
    {loFB("LO6")}
  </div>);

  const renderTasks=()=>(<div data-wb-section="tasks">
    <h2 style={{fontSize:20,fontWeight:800,color:DG,borderBottom:`2px solid ${G}`,paddingBottom:8,marginBottom:20}}>Assessment Tasks</h2>
    <div style={{padding:14,background:AMBER_LT,border:`1px solid ${AMBER}`,borderRadius:8,marginBottom:20,fontSize:14,lineHeight:1.6}}>
      <strong style={{color:"#92400e"}}>Important:</strong> This unit is assessed by practical demonstration in a water-based setting. Your assessor will observe you during the canoeing session. Written tasks below support your practical evidence. Where a criterion uses a plural, a minimum of TWO examples is required.
    </div>
    {[{id:"T1",ac:"AC 1.1",title:"Water-based Activities",instruction:"In LO 1, describe a minimum of TWO different water-based activities. For each, explain what it involves, where it takes place in Wales, and who might participate."},
      {id:"T2",ac:"AC 2.1–2.4",title:"Activity Requirements",instruction:"In LO 2, complete all four AC boxes: describe the features of canoeing, assess your own skills, state the equipment needed, and state the emergency and safety requirements."},
      {id:"T3",ac:"AC 3.1–3.2",title:"Preparation",instruction:"In LO 3, describe how you selected and checked your equipment, and how you prepared for the session including the safety briefing."},
      {id:"T4",ac:"AC 4.1",title:"Practical Participation",instruction:"Participate in the canoeing session. Your assessor will observe your use of skills and techniques, equipment, and safety checks. Record your own account in LO 4."},
      {id:"T5",ac:"AC 5.1",title:"Equipment Maintenance",instruction:"After the session, maintain the equipment as directed. Your assessor will observe this. Record what you did in LO 5."},
      {id:"T6",ac:"AC 6.1",title:"Self-Assessment",instruction:"Complete the self-assessment in LO 6. Reflect on your performance — what went well, what was challenging, and what you would improve."},
    ].map(t=>(<div key={t.id} style={{border:`1px solid ${BD}`,borderRadius:8,padding:16,marginBottom:12,background:"white"}}>
      <div style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:8}}>
        <span style={{background:DG,color:"white",borderRadius:12,padding:"2px 10px",fontSize:12,fontWeight:700,flexShrink:0}}>{t.id}</span>
        <span style={{background:LG,color:G,borderRadius:12,padding:"2px 10px",fontSize:12,fontWeight:600,flexShrink:0}}>{t.ac}</span>
        <span style={{fontWeight:700,color:DG,fontSize:14}}>{t.title}</span>
      </div>
      <div style={{fontSize:14,lineHeight:1.6}}>{t.instruction}</div>
      {am&&(<div style={{marginTop:10,padding:10,background:ASSESSOR_LT,border:`1px solid ${ASSESSOR_BD}`,borderRadius:6}} data-wb-feedback="true"><div style={{fontSize:12,fontWeight:600,color:ASSESSOR_BG,marginBottom:4}}>Task feedback — {t.id}</div><textarea value={data.task_feedback[t.id]||""} onChange={e=>update({task_feedback:{...data.task_feedback,[t.id]:e.target.value}})} rows={2} style={{width:"100%",padding:8,border:`1px solid ${ASSESSOR_BD}`,borderRadius:4,fontSize:13,fontFamily:"inherit"}} placeholder="Assessor feedback..."/></div>)}
    </div>))}
    {am&&(<div style={{marginTop:24,padding:16,background:ASSESSOR_LT,border:`2px solid ${ASSESSOR_BD}`,borderRadius:10}}>
      <div style={{fontWeight:700,color:ASSESSOR_BG,fontSize:15,marginBottom:12}}>Overall Assessment Result</div>
      <div style={{display:"flex",gap:10,marginBottom:12}}>{["PASS","REFER","PENDING"].map(v=>(<button key={v} onClick={()=>update({overall_result:data.overall_result===v?"":v})} style={{padding:"8px 20px",borderRadius:8,fontWeight:700,fontSize:14,cursor:"pointer",border:`2px solid ${v==="PASS"?G:v==="REFER"?RED:AMBER}`,background:data.overall_result===v?(v==="PASS"?G:v==="REFER"?RED:AMBER):"white",color:data.overall_result===v?"white":(v==="PASS"?G:v==="REFER"?RED:"#92400e")}}>{v}</button>))}</div>
      <input type="text" value={data.assessorSig||""} onChange={e=>update({assessorSig:e.target.value})} placeholder="Assessor signature (type name)" style={{width:"100%",padding:"8px 12px",border:`1px solid ${ASSESSOR_BD}`,borderRadius:6,fontSize:14,fontFamily:"inherit",marginBottom:8}}/>
      <input type="date" value={data.markedDate||""} onChange={e=>update({markedDate:e.target.value})} style={{padding:"8px 12px",border:`1px solid ${ASSESSOR_BD}`,borderRadius:6,fontSize:14,fontFamily:"inherit"}}/>
    </div>)}
    <div style={{marginTop:24,padding:16,border:`1px solid ${BD}`,borderRadius:8,background:"white"}}>
      <div style={{fontWeight:700,color:DG,marginBottom:12}}>Student Declaration</div>
      <div style={{fontSize:14,lineHeight:1.6,marginBottom:12}}>By signing below, I confirm that all work in this workbook is my own. I have not copied from another student or used someone else's work without acknowledgement.</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <div><div style={{fontSize:13,color:MG,marginBottom:4}}>Student signature:</div><input type="text" value={data.studentSig||""} onChange={e=>update({studentSig:e.target.value})} placeholder="Type name as signature" style={{width:"100%",padding:"8px 12px",border:`1px solid ${BD}`,borderRadius:6,fontSize:14,fontFamily:"inherit"}}/></div>
        <div><div style={{fontSize:13,color:MG,marginBottom:4}}>Date:</div><input type="date" value={data.declarationDate||""} onChange={e=>update({declarationDate:e.target.value})} style={{width:"100%",padding:"8px 12px",border:`1px solid ${BD}`,borderRadius:6,fontSize:14,fontFamily:"inherit"}}/></div>
      </div>
    </div>
  </div>);

  const renderEvidence=()=>(<div data-wb-section="evidence">
    <h2 style={{fontSize:20,fontWeight:800,color:DG,borderBottom:`2px solid ${G}`,paddingBottom:8,marginBottom:16}}>Photo & Audio Evidence</h2>
    <div style={{padding:14,background:BLUE_LT,border:`1px solid ${ASSESSOR_BD}`,borderRadius:8,marginBottom:16,fontSize:14,lineHeight:1.6}}>Images and audio recordings are both saved inside your workbook file and will be there when you reload. For each item: write a brief description, then tick the criteria it provides evidence for.</div>
    {data.evidence_items.map(it=>(<div key={it.id} style={{border:`1px solid ${BD}`,borderRadius:8,padding:16,marginBottom:12,background:"white"}}>
      <div style={{display:"grid",gridTemplateColumns:"140px 1fr",gap:12}}>
        <div>
          <Thumb it={it}/>
          {!am&&(<label style={{display:"block",marginTop:6,padding:"5px 0",textAlign:"center",background:LG,border:`1px solid ${G}`,borderRadius:4,cursor:"pointer",fontSize:12,color:G,fontWeight:600}}>Upload photo/audio<input type="file" accept="image/*,audio/*" style={{display:"none"}} onChange={e=>handleFile(it.id,e.target.files[0])}/></label>)}
          {it.b64&&it.mediaType==="audio"&&(<audio controls src={it.b64} style={{width:"100%",marginTop:6,height:36}}/>)}
        </div>
        <div>
          <textarea value={it.desc} onChange={e=>patchItem(it.id,{desc:e.target.value})} placeholder="Describe what this photo/audio shows..." rows={3} style={{width:"100%",padding:"8px 10px",border:`1px solid ${BD}`,borderRadius:4,fontSize:13,fontFamily:"inherit",marginBottom:8,resize:"vertical"}} readOnly={am}/>
          <div style={{fontSize:12,fontWeight:600,color:DG,marginBottom:6}}>Evidence for:</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>{ACS.map(ac=>(<label key={ac.id} style={{display:"flex",alignItems:"center",gap:4,fontSize:12,cursor:"pointer",padding:"2px 8px",border:`1px solid ${it.acs.includes(ac.id)?G:BD}`,borderRadius:10,background:it.acs.includes(ac.id)?LG:"white",color:it.acs.includes(ac.id)?G:MG}}><input type="checkbox" checked={it.acs.includes(ac.id)} disabled={am} onChange={e=>patchItem(it.id,{acs:e.target.checked?[...it.acs,ac.id]:it.acs.filter(x=>x!==ac.id)})} style={{display:"none"}}/>AC {ac.id}</label>))}</div>
          {it.fileName&&<div style={{fontSize:11,color:MG,marginTop:6}}>File: {it.fileName}</div>}
        </div>
      </div>
      {!am&&(<button onClick={()=>removeItem(it.id)} style={{marginTop:8,padding:"4px 12px",background:"white",border:`1px solid ${RED}`,borderRadius:4,color:RED,fontSize:12,cursor:"pointer"}}>Remove</button>)}
    </div>))}
    {!am&&(<button onClick={addEvidenceItem} style={{padding:"10px 20px",background:G,color:"white",border:"none",borderRadius:8,fontSize:14,fontWeight:600,cursor:"pointer",marginTop:4}}>+ Add photo / audio evidence</button>)}
  </div>);

  const renderChecklist=()=>(<div data-wb-section="checklist">
    <h2 style={{fontSize:20,fontWeight:800,color:DG,borderBottom:`2px solid ${G}`,paddingBottom:8,marginBottom:20}}>Criteria Evidence Checklist</h2>
    <div style={{fontSize:14,color:MG,marginBottom:16}}>Tick each criterion when you have completed the relevant task and have evidence to support it.</div>
    {ACS.map(ac=>(<div key={ac.id} style={{display:"flex",alignItems:"flex-start",gap:12,padding:"10px 0",borderBottom:`1px solid ${BD}`}}><input type="checkbox" checked={!!data.checklist[ac.id]} disabled={am} onChange={e=>update({checklist:{...data.checklist,[ac.id]:e.target.checked}})} style={{marginTop:2,width:18,height:18,accentColor:G,flexShrink:0}}/><div><span style={{fontWeight:700,color:G,marginRight:8}}>AC {ac.id}</span><span style={{fontSize:14}}>{ac.text}</span></div></div>))}
  </div>);

  const renderGlossary=()=>(<div data-wb-section="glossary">
    <h2 style={{fontSize:20,fontWeight:800,color:DG,borderBottom:`2px solid ${G}`,paddingBottom:8,marginBottom:20}}>Glossary</h2>
    {GLOSSARY.map(([term,def])=>(<div key={term} style={{padding:"10px 0",borderBottom:`1px solid ${BD}`,display:"grid",gridTemplateColumns:"200px 1fr",gap:16}}><div style={{fontWeight:700,color:DG,fontSize:14}}>{term}</div><div style={{fontSize:14,lineHeight:1.5}}>{def}</div></div>))}
  </div>);

  const sectionMap={cover:renderCover,contents:renderContents,intro:renderIntro,lo1:renderLO1,lo2:renderLO2,lo3:renderLO3,lo4:renderLO4,lo5:renderLO5,lo6:renderLO6,tasks:renderTasks,evidence:renderEvidence,checklist:renderChecklist,glossary:renderGlossary};

  return(<div style={{minHeight:"100vh",background:LGR}}>
    <div id="ev-cover-strip" style={{display:"none",padding:24,border:"2px solid black",marginBottom:24,pageBreakAfter:"always"}}>
      <div style={{fontWeight:800,fontSize:18,marginBottom:8}}>External Verification — Evidence Summary</div>
      <div style={{fontSize:14}}><strong>Unit:</strong> MH32CY008 — Participate in a Water-based Activity (Canoeing)</div>
      <div style={{fontSize:14}}><strong>Student:</strong> {data.studentName}</div>
      <div style={{fontSize:14}}><strong>Assessor:</strong> {data.assessorName}</div>
      <div style={{fontSize:14}}><strong>Centre:</strong> Brynllywarch</div>
      <div style={{fontSize:14,marginTop:8}}><strong>AC Status:</strong></div>
      {ACS.map(ac=>(<div key={ac.id} style={{fontSize:13,padding:"2px 0"}}>AC {ac.id}: {data.ac_status[ac.id]||"Not yet marked"} — {ac.text}</div>))}
      <div style={{fontSize:14,marginTop:8}}><strong>Overall Result:</strong> {data.overall_result||"Pending"}</div>
      <div style={{fontSize:14}}><strong>Assessor Signature:</strong> {data.assessorSig}</div>
      <div style={{fontSize:14}}><strong>Date Marked:</strong> {data.markedDate}</div>
    </div>

    <div style={{position:"sticky",top:0,zIndex:100,background:am?ASSESSOR_BG:G,boxShadow:"0 2px 8px rgba(0,0,0,0.15)"}}>
      <div style={{maxWidth:900,margin:"0 auto",padding:"0 16px",height:60,display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
        <div style={{flex:1,minWidth:0}}><div style={{color:"white",fontWeight:800,fontSize:14,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>MH32CY008 — Water-based Activity</div><div style={{color:"rgba(255,255,255,0.75)",fontSize:11}}>Canoeing · Agored Cymru Level 2</div></div>
        <div style={{display:"flex",alignItems:"center",gap:8}}><img src={LOGO_SRC} alt="Brynllywarch" style={{height:36,borderRadius:4}}/><img src={AGORED_LOGO_SRC} alt="Agored Cymru" style={{height:32}}/></div>
        <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
          {saved&&<span style={{background:"rgba(255,255,255,0.2)",color:"white",borderRadius:10,padding:"2px 8px",fontSize:11}}>Saved</span>}
          {am&&<span style={{background:"rgba(255,255,255,0.2)",color:"white",borderRadius:10,padding:"2px 8px",fontSize:11,fontWeight:700}}>ASSESSOR MODE</span>}
          <span style={{background:"rgba(255,255,255,0.2)",color:"white",borderRadius:10,padding:"2px 8px",fontSize:11}}>{pct}% complete</span>
          <button onClick={exportJSON} className="no-print" style={{padding:"4px 10px",background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.4)",borderRadius:6,color:"white",fontSize:12,cursor:"pointer"}}>↓ Save File</button>
          <label className="no-print" style={{padding:"4px 10px",background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.4)",borderRadius:6,color:"white",fontSize:12,cursor:"pointer"}}>↑ Load File<input type="file" accept=".json" style={{display:"none"}} onChange={importJSON}/></label>
          <button onClick={()=>setShowPrintModal(true)} className="no-print" style={{padding:"4px 10px",background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.4)",borderRadius:6,color:"white",fontSize:12,cursor:"pointer"}}>🖨 Print</button>
        </div>
      </div>
    </div>
    <div style={{position:"sticky",top:60,zIndex:99,background:am?ASSESSOR_BG:"white",borderBottom:`1px solid ${am?ASSESSOR_BD:BD}`,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
      <div style={{maxWidth:900,margin:"0 auto",padding:"0 16px",height:48,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <span style={{fontSize:13,color:am?"white":MG}}>{am?"ASSESSOR MODE — You are marking this workbook.":"Student mode — your answers are editable."}</span>
        {am?(<button onClick={()=>update({assessorMode:false})} className="no-print" style={{padding:"5px 14px",background:"white",border:"none",borderRadius:6,color:ASSESSOR_BG,fontWeight:700,fontSize:13,cursor:"pointer"}}>Exit Assessor Mode</button>):(<button onClick={()=>setShowPwModal(true)} className="no-print" style={{padding:"5px 14px",background:G,border:"none",borderRadius:6,color:"white",fontWeight:700,fontSize:13,cursor:"pointer"}}>Enter Assessor Mode</button>)}
      </div>
    </div>
    <div className="no-print" style={{position:"sticky",top:108,zIndex:98,background:"white",borderBottom:`1px solid ${BD}`,overflowX:"auto"}}>
      <div style={{maxWidth:900,margin:"0 auto",padding:"0 8px",display:"flex",gap:2}}>
        {navs.map(s=>(<button key={s} onClick={()=>setSection(s)} style={{padding:"8px 10px",border:"none",background:"none",cursor:"pointer",fontSize:12,fontWeight:section===s?700:400,color:section===s?G:MG,borderBottom:section===s?`2px solid ${G}`:"2px solid transparent",whiteSpace:"nowrap"}}>{SLABELS[s]}</button>))}
      </div>
    </div>
    <div style={{maxWidth:900,margin:"0 auto",padding:"24px 16px"}}>
      {resultBanner()}
      {(sectionMap[section]||renderCover)()}
      <div className="no-print" style={{display:"flex",justifyContent:"space-between",marginTop:32,paddingTop:16,borderTop:`1px solid ${BD}`}}>
        {navs.indexOf(section)>0?(<button onClick={()=>setSection(navs[navs.indexOf(section)-1])} style={{padding:"10px 20px",background:"white",border:`1px solid ${BD}`,borderRadius:8,color:G,fontWeight:600,fontSize:14,cursor:"pointer"}}>← Previous</button>):<div/>}
        {navs.indexOf(section)<navs.length-1&&(<button onClick={()=>setSection(navs[navs.indexOf(section)+1])} style={{padding:"10px 20px",background:G,border:"none",borderRadius:8,color:"white",fontWeight:600,fontSize:14,cursor:"pointer"}}>Continue →</button>)}
      </div>
    </div>
    {showPwModal&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{background:"white",borderRadius:12,padding:28,width:340,boxShadow:"0 8px 32px rgba(0,0,0,0.2)"}}><div style={{fontWeight:800,fontSize:18,color:DG,marginBottom:16}}>Enter Assessor Mode</div><input type="password" value={pwInput} onChange={e=>{setPwInput(e.target.value);setPwError(false);}} onKeyDown={e=>e.key==="Enter"&&enterAM()} placeholder="Assessor password" style={{width:"100%",padding:"10px 12px",border:`1px solid ${pwError?RED:BD}`,borderRadius:6,fontSize:14,fontFamily:"inherit",marginBottom:pwError?4:12}}/>{pwError&&<div style={{color:RED,fontSize:12,marginBottom:8}}>Incorrect password.</div>}<div style={{display:"flex",gap:10}}><button onClick={enterAM} style={{flex:1,padding:"10px 0",background:G,border:"none",borderRadius:6,color:"white",fontWeight:700,fontSize:14,cursor:"pointer"}}>Enter</button><button onClick={()=>{setShowPwModal(false);setPwInput("");setPwError(false);}} style={{flex:1,padding:"10px 0",background:"white",border:`1px solid ${BD}`,borderRadius:6,color:MG,fontSize:14,cursor:"pointer"}}>Cancel</button></div></div></div>)}
    {showPrintModal&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{background:"white",borderRadius:12,padding:28,width:360,boxShadow:"0 8px 32px rgba(0,0,0,0.2)"}}><div style={{fontWeight:800,fontSize:18,color:DG,marginBottom:16}}>Print Options</div>{[["full","Complete workbook"],["section","Current section only"],["ev","EV Summary sheet"]].map(([val,label])=>(<label key={val} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:`1px solid ${BD}`,cursor:"pointer"}}><input type="radio" name="pm" value={val} checked={printMode===val} onChange={()=>setPrintMode(val)} style={{accentColor:G}}/><span style={{fontSize:14}}>{label}</span></label>))}<div style={{display:"flex",gap:10,marginTop:16}}><button onClick={()=>doPrint(printMode)} style={{flex:1,padding:"10px 0",background:G,border:"none",borderRadius:6,color:"white",fontWeight:700,cursor:"pointer"}}>Print</button><button onClick={()=>setShowPrintModal(false)} style={{flex:1,padding:"10px 0",background:"white",border:`1px solid ${BD}`,borderRadius:6,color:MG,cursor:"pointer"}}>Cancel</button></div></div></div>)}
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script></body></html>
