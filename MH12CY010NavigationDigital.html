const GLOSSARY=[
  ["Contour line","A line on a map connecting points of equal height above sea level."],
  ["Grid reference","A set of numbers and/or letters used to identify a precise location on a map."],
  ["Scale","The ratio between distance on a map and actual distance on the ground."],
  ["Legend","The key on a map explaining what symbols and colours represent."],
  ["Bearing","A direction expressed as an angle measured clockwise from north, in degrees."],
  ["Magnetic north","The direction a compass needle points, slightly different from true north."],
  ["Grid north","The north direction on an OS map grid, used for navigation calculations."],
  ["Declination","The difference in angle between magnetic north and grid/true north."],
  ["Protractor compass","A compass with a rotating bezel and baseplate used for taking and following bearings."],
  ["Baseplate","The flat transparent plate on a compass used to measure distances on a map."],
  ["Bezel","The rotating ring on a compass marked in degrees, used to set a bearing."],
  ["Attack point","A distinctive, easily identified feature near your destination used as a final reference point."],
  ["Handrail","A linear feature such as a fence, river, or path used to guide navigation."],
  ["Catching feature","A feature beyond your target that tells you if you have gone too far."],
  ["Route card","A written plan for a journey including bearings, distances, timings, and emergency information."],
  ["Pace count","A method of estimating distance by counting steps over known terrain."],
  ["Resection","Finding your position on a map by taking bearings to two or more identifiable features."],
  ["Triangulation","Using bearings from multiple known points to find an unknown position."],
  ["Naismith's Rule","A formula for estimating walking time: 1 hour per 5km plus 1 hour per 600m of ascent."],
  ["Exit route","A pre-planned alternative route away from the main route used in emergencies."],
];

function useStorage(){
  const [data,setData]=useState(init());
  const [saved,setSaved]=useState(false);
  const timer=useRef(null);
  useEffect(()=>{try{const s=localStorage.getItem("mh12cy010v1");if(s)setData({...init(),...JSON.parse(s)});}catch{}},[]);
  const update=useCallback((patch)=>{
    setData(prev=>{
      const next={...prev,...patch};
      if(timer.current)clearTimeout(timer.current);
      timer.current=setTimeout(()=>{try{localStorage.setItem("mh12cy010v1",JSON.stringify(next));setSaved(true);setTimeout(()=>setSaved(false),2000);}catch{}},600);
      return next;
    });
  },[]);
  return{data,update,saved};
}

  const f=[data.ac11_types,data.ac12_parts,data.ac21_activity,data.ac21_description,

    ...data.ac21_routeRows.slice(0,3).map(r=>r.bearing)].filter(x=>x&&x.trim());
  return Math.min(100,Math.round((f.length/13)*100));
};

    fontSize:13,lineHeight:1.7,fontFamily:"inherit",minHeight:rows*22+20,display:"block",
    background:disabled?"#f9fafb":"#fff",color:"#1a1a1a",cursor:disabled?"not-allowed":"text"}}
    value={value||""} onChange={e=>!disabled&&onChange(e.target.value)} placeholder={ph} readOnly={disabled}/>
);
const Inp=({label,value,onChange,ph="",disabled=false})=>(
  <div style={{display:"flex",flexDirection:"column",gap:4}}>
    {label&&<label style={{fontSize:11,color:MG,fontWeight:600}}>{label}</label>}
    <input style={{border:`1.5px solid ${disabled?"#e5e7eb":BD}`,borderRadius:8,padding:"8px 12px",
      fontSize:13,fontFamily:"inherit",width:"100%",background:disabled?"#f9fafb":"#fff",
      color:"#1a1a1a",cursor:disabled?"not-allowed":"text"}}
      value={value||""} onChange={e=>!disabled&&onChange(e.target.value)} placeholder={ph} readOnly={disabled}/>
  </div>
);
const KB=({title,items})=>(
  <div style={{background:LG,borderLeft:`4px solid ${G}`,borderRadius:"0 8px 8px 0",padding:"14px 18px",marginBottom:14}}>
    <div style={{fontSize:12,fontWeight:700,color:G,marginBottom:8}}>📚 {title}</div>
    {items.map((x,i)=><div key={i} style={{fontSize:13,color:"#2a2a2a",lineHeight:1.7,marginBottom:3}}>{x}</div>)}
  </div>
);
const ACQ=({ac,label,children})=>(
  <div style={{marginBottom:24}}>
    <span style={{background:G,color:"#fff",fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:4,display:"inline-block",marginBottom:6}}>AC {ac}</span>
    <div style={{fontSize:15,fontWeight:600,color:"#1a1a1a",marginBottom:8}}>{label}</div>
    {children}
  </div>
);
const Divider=()=><hr style={{border:"none",borderTop:`1px solid ${BD}`,margin:"24px 0"}}/>;
const LOHeader=({num,title})=>(
  <div style={{background:G,color:"#fff",padding:"14px 18px",borderRadius:10,marginBottom:18}}>
    <div style={{fontSize:11,opacity:0.7,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>Learning Outcome {num}</div>
    <div style={{fontSize:17,fontWeight:700,marginTop:4}}>{title}</div>
  </div>
);
const ContinueBtn=({label,onClick})=>(
  <button onClick={onClick} style={{background:G,color:"#fff",border:"none",borderRadius:8,padding:"11px 22px",fontSize:13,fontWeight:700,cursor:"pointer",marginTop:8}}>{label}</button>
);

const RouteTable=({rows,onChange,disabled})=>(
  <div style={{overflowX:"auto",marginBottom:12}}>
    <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:700}}>
      <thead>
        <tr>{["Leg / Checkpoint","Bearing (°)","Distance","Est. Time","Height Change","Notes/Hazards"].map(h=>(
          <th key={h} style={{background:G,color:"#fff",padding:"8px 10px",textAlign:"left",fontWeight:600,whiteSpace:"nowrap"}}>{h}</th>
        ))}</tr>
      </thead>
      <tbody>
        {rows.map((row,ri)=>(
          <tr key={ri}>{Object.keys(row).map((k,ci)=>(
            <td key={ci} style={{border:`1px solid ${BD}`,padding:0,verticalAlign:"top"}}>
              <textarea style={{width:"100%",border:"none",padding:"7px 9px",fontSize:12,fontFamily:"inherit",minHeight:55,resize:"vertical",
                background:disabled?"#f9fafb":"transparent",display:"block",color:"#1a1a1a",cursor:disabled?"not-allowed":"text"}}
                value={row[k]||""} onChange={e=>{if(disabled)return;const nr=rows.map((r,rr)=>rr===ri?{...r,[k]:e.target.value}:r);onChange(nr);}} readOnly={disabled}/>
            </td>
          ))}</tr>
        ))}
      </tbody>
    </table>
  </div>
);

const EV_LOS=[
  {id:1,label:"LO 1 — Maps & Compasses",acs:[{id:"1.1",text:"Types and purpose of maps"},{id:"1.2",text:"Features of a protractor compass"}]},
  {id:2,label:"LO 2 — Route Card",acs:[{id:"2.1",text:"Route card created with all elements"}]},
  {id:3,label:"LO 3 — Complete the Route",acs:[{id:"3.1",text:"Completed planned route (min 4hrs)"},{id:"3.2",text:"Reviewed timings and alterations"}]},
];

const EvidenceSection=({items,onUpdate,assessorMode:am})=>{
  const [nextId,setNextId]=useState(()=>items.length?Math.max(...items.map(i=>i.id))+1:1);
  const addItem=()=>{const id=nextId;setNextId(id+1);onUpdate([...items,{id,desc:"",acs:[],mediaType:null,fileName:null,b64:null,objUrl:null,amStatus:"",amFeedback:""}]);};
  const removeItem=(id)=>onUpdate(items.filter(i=>i.id!==id));
  const patchItem=(id,patch)=>onUpdate(items.map(i=>i.id===id?{...i,...patch}:i));
  const toggleAC=(id,ac)=>{const it=items.find(i=>i.id===id);if(!it)return;const acs=it.acs.includes(ac)?it.acs.filter(a=>a!==ac):[...it.acs,ac];patchItem(id,{acs});};
  const handleFile=(id,file)=>{
    if(!file)return;
    if(file.type.startsWith("video")){patchItem(id,{mediaType:"video",fileName:file.name,b64:null,objUrl:URL.createObjectURL(file)});}
    else{const reader=new FileReader();reader.onload=ev=>patchItem(id,{mediaType:"image",fileName:file.name,b64:ev.target.result,objUrl:null});reader.readAsDataURL(file);}
  };
  const statusTag=(s)=>{
    const styles={met:{bg:"#dcfce7",color:"#14532d",border:"#16a34a",label:"Met"},notyet:{bg:"#fef2f2",color:"#7f1d1d",border:"#dc2626",label:"Not yet met"}};
    const st=styles[s]||{bg:"#f1f5f9",color:"#334155",border:"#94a3b8",label:"Pending"};
    return <span style={{display:"inline-flex",alignItems:"center",padding:"3px 9px",borderRadius:12,fontSize:11,fontWeight:600,background:st.bg,color:st.color,border:`1px solid ${st.border}`}}>{st.label}</span>;
  };
  const Thumb=({it})=>{
    if(it.b64)return <img src={it.b64} alt="evidence" style={{width:82,height:82,borderRadius:6,objectFit:"cover",border:`1px solid ${BD}`,flexShrink:0}}/>;
    if(it.objUrl&&it.mediaType==="video")return(<div style={{width:82,height:82,borderRadius:6,background:"#f3e8ff",border:"1px solid #c4b5fd",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,flexShrink:0}}><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" strokeWidth="1.5"><polygon points="5,3 19,12 5,21"/></svg><span style={{fontSize:9,fontWeight:700,background:"#7c3aed",color:"#fff",padding:"1px 5px",borderRadius:3}}>VIDEO</span></div>);
    return(<div style={{width:82,height:82,borderRadius:6,background:LG,border:"1px solid #bbf7d0",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,flexShrink:0}}><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke={G} strokeWidth="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><span style={{fontSize:9,color:MG}}>no file</span></div>);
  };
  const ACSelector=({it})=>(
    <div style={{marginTop:10}}>
      <div style={{fontSize:12,fontWeight:600,color:"#374151",marginBottom:6}}>Which assessment criteria does this evidence support?</div>
      {EV_LOS.map(lo=>(
        <div key={lo.id} style={{marginBottom:8}}>
          <div style={{fontSize:11,fontWeight:700,color:G,background:LG,padding:"2px 8px",borderRadius:4,display:"inline-block",marginBottom:5}}>{lo.label}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:5}}>
            {lo.acs.map(ac=>{const sel=it.acs.includes(ac.id);return(
              <div key={ac.id} onClick={()=>!am&&toggleAC(it.id,ac.id)}
                style={{display:"flex",alignItems:"flex-start",gap:6,padding:"5px 8px",borderRadius:6,cursor:am?"default":"pointer",
                  border:`1px solid ${sel?G:BD}`,background:sel?LG:"#fff",fontSize:11,lineHeight:1.3}}>
                <div style={{width:13,height:13,border:`1.5px solid ${sel?G:BD}`,borderRadius:3,background:sel?G:"#fff",
                  display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
                  {sel&&<span style={{color:"#fff",fontSize:9,fontWeight:700}}>✓</span>}
                </div>
                <span style={{fontWeight:sel?700:400,color:sel?"#0F4525":"#374151"}}><strong>AC {ac.id}</strong> — {ac.text}</span>
              </div>
            );})}
          </div>
        </div>
      ))}
    </div>
  );
  return(
    <div>
      <h2 style={{color:G,marginBottom:6,fontSize:22}}>Photo &amp; Video Evidence</h2>
      <p style={{fontSize:13,color:MG,marginBottom:14}}>{am?"Reviewing student evidence submissions.":"Photo and video evidence is especially important for this unit — AC 3.1 requires practical demonstration. Upload images or video clips of your route completion, map reading, and compass work."}</p>
      {!am&&(<>
        <div style={{background:"#fffbeb",border:"1px solid #fcd34d",borderRadius:6,padding:"8px 12px",marginBottom:10,fontSize:12,color:"#92400e"}}><strong>Images</strong> are saved inside your workbook file and will be there when you reload. <strong>Videos</strong> are held in memory for this session only — keep your original video files safe.</div>
        <div style={{background:LG,borderLeft:`4px solid ${G}`,borderRadius:"0 8px 8px 0",padding:"10px 14px",marginBottom:16,fontSize:12,color:"#0F4525"}}>For each item: write a brief description of what it shows, then tick the criteria it provides evidence for. Your route card photo is essential evidence for AC 2.1.</div>
      </>)}
      {items.map((it,idx)=>(
        <div key={it.id} style={{background:am?"#f0f7ff":"#fff",borderRadius:10,border:`1.5px solid ${am?"#3b82f6":BD}`,borderLeft:`3px solid ${G}`,padding:16,marginBottom:14}}>
          <div style={{display:"flex",gap:14,alignItems:"flex-start"}}>
            <Thumb it={it}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}>
                <span style={{fontSize:12,fontWeight:700,color:G}}>Evidence item {idx+1}</span>
                {it.amStatus&&!am&&statusTag(it.amStatus)}
              </div>
              {am?<div style={{fontSize:13,color:"#374151",marginBottom:6}}>{it.desc||<em style={{color:MG}}>No description provided</em>}</div>
                :<textarea style={{width:"100%",border:`1.5px solid ${BD}`,borderRadius:8,padding:"8px 10px",fontSize:12,fontFamily:"inherit",resize:"vertical",minHeight:52,display:"block",color:"#1a1a1a"}}
                    value={it.desc||""} onChange={e=>patchItem(it.id,{desc:e.target.value})} placeholder="Describe what this photo/video shows and how it demonstrates your navigation skills..."/>}
              {!am&&<ACSelector it={it}/>}
              {am&&(<div style={{marginTop:6,display:"flex",flexWrap:"wrap",gap:4}}>{it.acs.length?it.acs.map(a=><span key={a} style={{display:"inline-flex",padding:"3px 9px",borderRadius:12,fontSize:11,fontWeight:600,background:LG,color:"#0F4525",border:`1px solid ${G}`}}>{a}</span>):<span style={{fontSize:11,color:MG}}>No criteria linked</span>}</div>)}
              {am&&(<div style={{marginTop:12,paddingTop:10,borderTop:"1px solid #bfdbfe"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                  <span style={{fontSize:11,fontWeight:700,color:"#1e3a8a"}}>Assessor decision for this item</span>
                  <div style={{display:"flex",border:`1.5px solid ${BD}`,borderRadius:6,overflow:"hidden",fontSize:11,fontWeight:600}}>
                    <button onClick={()=>patchItem(it.id,{amStatus:it.amStatus==="met"?"":"met"})} style={{padding:"4px 10px",border:"none",cursor:"pointer",background:it.amStatus==="met"?"#16a34a":"#fff",color:it.amStatus==="met"?"#fff":"#374151"}}>Met</button>
                    <button onClick={()=>patchItem(it.id,{amStatus:it.amStatus==="notyet"?"":"notyet"})} style={{padding:"4px 10px",border:"none",cursor:"pointer",background:it.amStatus==="notyet"?"#dc2626":"#fff",color:it.amStatus==="notyet"?"#fff":"#374151"}}>Not yet met</button>
                  </div>
                </div>
                <textarea style={{width:"100%",border:"1px solid #93c5fd",borderRadius:6,padding:"7px 10px",fontSize:12,fontFamily:"inherit",background:"#eff6ff",resize:"vertical",minHeight:48,color:"#1e3a8a"}}
                  value={it.amFeedback||""} onChange={e=>patchItem(it.id,{amFeedback:e.target.value})} placeholder="Assessor feedback on this evidence item..."/>
              </div>)}
              {!am&&it.amStatus&&it.amFeedback&&(<div style={{background:"#eff6ff",border:"1px solid #93c5fd",borderRadius:6,padding:"8px 10px",fontSize:12,color:"#1e40af",marginTop:6}}><span style={{fontWeight:700}}>Assessor feedback:</span> {it.amFeedback} {statusTag(it.amStatus)}</div>)}
            </div>
          </div>
          {!am&&(<div style={{display:"flex",gap:8,justifyContent:"flex-end",alignItems:"center",marginTop:10,flexWrap:"wrap"}}>
            {it.fileName&&<span style={{fontSize:11,color:MG,flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{it.fileName}</span>}
            <label style={{padding:"4px 10px",borderRadius:6,border:`1.5px solid ${G}`,background:"#fff",color:G,fontSize:11,fontWeight:600,cursor:"pointer"}}>{it.fileName?"Replace file":"Upload photo/video"}<input type="file" accept="image/*,video/*" style={{display:"none"}} onChange={e=>handleFile(it.id,e.target.files[0])}/></label>
            <button onClick={()=>removeItem(it.id)} style={{padding:"4px 10px",borderRadius:6,border:"1.5px solid #dc2626",background:"#dc2626",color:"#fff",fontSize:11,fontWeight:600,cursor:"pointer"}}>Remove</button>
          </div>)}
        </div>
      ))}
      {!am&&(<button onClick={addItem} style={{width:"100%",padding:10,borderRadius:8,border:`1.5px solid ${G}`,background:"#fff",color:G,fontSize:13,fontWeight:600,cursor:"pointer",marginTop:2}}>+ Add photo / video evidence</button>)}
    </div>
  );
};

const AssessorFeedback=({label,value,onChange,assessorMode})=>{
  if(!assessorMode&&!value)return null;
  return(
    <div data-wb-feedback="true" style={{background:assessorMode?ASSESSOR_LT:BLUE_LT,border:`1.5px solid ${assessorMode?ASSESSOR_BD:"#93c5fd"}`,borderRadius:8,padding:"12px 14px",marginTop:12}}>
      <div style={{fontSize:11,fontWeight:700,color:assessorMode?ASSESSOR_BG:BLUE,marginBottom:6}}>Assessor Feedback — {label}</div>
      {assessorMode?<TA rows={3} value={value} onChange={onChange} ph="Enter feedback for this section..."/>
        :<div style={{fontSize:13,color:ASSESSOR_BG,lineHeight:1.6}}>{value}</div>}
    </div>
  );
};

const ACStatus=({id,status,onChange})=>(
  <div style={{display:"flex",gap:6,alignItems:"center",marginTop:8}}>
    <span style={{fontSize:11,fontWeight:700,color:ASSESSOR_BG}}>Assessor decision:</span>
    {[["Met","met","#16a34a"],["Not yet met","notyet",RED]].map(([l,v,c])=>(
      <button key={v} onClick={()=>onChange(status===v?"":v)}
        style={{padding:"3px 10px",borderRadius:4,border:`1.5px solid ${status===v?c:BD}`,
          background:status===v?c:"#fff",color:status===v?"#fff":MG,fontSize:10,fontWeight:700,cursor:"pointer"}}>{l}</button>
    ))}
  </div>
);

const PasswordModal=({onSuccess,onCancel})=>{
  const [pw,setPw]=useState("");const [err,setErr]=useState(false);
  const check=()=>{if(pw===ASSESSOR_PASS){setErr(false);onSuccess();}else{setErr(true);setPw("");}};
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:14,padding:"32px 36px",width:360,boxShadow:"0 8px 32px rgba(0,0,0,0.25)"}}>
        <div style={{fontSize:20,fontWeight:700,color:ASSESSOR_BG,marginBottom:6}}>Assessor Access</div>
        <div style={{fontSize:13,color:MG,marginBottom:20,lineHeight:1.6}}>Enter the assessor password to continue.</div>
        <input type="password" autoFocus value={pw} onChange={e=>{setPw(e.target.value);setErr(false);}}
          onKeyDown={e=>e.key==="Enter"&&check()} placeholder="Enter assessor password"
          style={{width:"100%",border:`2px solid ${err?"#dc2626":ASSESSOR_BD}`,borderRadius:8,padding:"10px 14px",
            fontSize:14,fontFamily:"inherit",marginBottom:8,background:"#fff",color:"#1a1a1a"}}/>
        {err&&<div style={{fontSize:12,color:"#dc2626",marginBottom:10,fontWeight:600}}>Incorrect password. Please try again.</div>}
        <div style={{display:"flex",gap:10,marginTop:12}}>
          <button onClick={check} style={{flex:1,padding:"10px",borderRadius:8,border:"none",background:ASSESSOR_BG,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>Unlock</button>
          <button onClick={onCancel} style={{flex:1,padding:"10px",borderRadius:8,border:`1.5px solid ${BD}`,background:"#fff",color:MG,fontSize:13,cursor:"pointer"}}>Cancel</button>
        </div>
      </div>
    </div>
  );
};

function App(){
  const {data,update,saved}=useStorage();
  const [sec,setSec]=useState("cover");
  const [showPwModal,setShowPwModal]=useState(false);
  const [showPrintMenu,setShowPrintMenu]=useState(false);
  const [printMode,setPrintMode]=useState("all");
  const [printWithFeedback,setPrintWithFeedback]=useState(false);
  const [importMsg,setImportMsg]=useState(null);
  const fileRef=useRef(null);
  const am=data.assessorMode;
  const p=pct(data);
  const mc=markedCount(data);
  const metCount=Object.values(data.ac_status||{}).filter(v=>v==="met").length;
  const upd=k=>v=>update({[k]:v});
  const acStatus=id=>(data.ac_status||{})[id]||"";
  const setACStatus=(id,val)=>{const s={...(data.ac_status||{})};s[id]=val;update({ac_status:s});};
  const loFb=lo=>(data.lo_feedback||{})[lo]||"";
  const setLOFeedback=(lo,val)=>{const f={...(data.lo_feedback||{})};f[lo]=val;update({lo_feedback:f});};
  const taskFb=t=>(data.task_feedback||{})[t]||"";
  const setTaskFeedback=(t,val)=>{const f={...(data.task_feedback||{})};f[t]=val;update({task_feedback:f});};

  const exportData=()=>{
    const name=(data.studentName||"student").replace(/\s+/g,"_").toLowerCase();
    const blob=new Blob([JSON.stringify({...data,_exported:new Date().toISOString(),_unit:"MH12CY010"},null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");
    a.href=url;a.download=`MH12CY010_${name}_workbook.json`;a.click();URL.revokeObjectURL(url);
  };
  const importData=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const parsed=JSON.parse(ev.target.result);
        if(!parsed._unit||parsed._unit!=="MH12CY010"){setImportMsg({ok:false,text:"This file is not an MH12CY010 workbook."});}
        else{const{_exported,_unit,...rest}=parsed;update({...init(),...rest});setImportMsg({ok:true,text:`Workbook loaded for ${parsed.studentName||"student"}.`});}
      }catch{setImportMsg({ok:false,text:"Could not read file."});}
      setTimeout(()=>setImportMsg(null),4000);
    };
    reader.readAsText(file);e.target.value="";
  };

  const doPrint=(mode,withFeedback)=>{
    setShowPrintMenu(false);
    setTimeout(()=>{
      const panels=document.querySelectorAll("[data-wb-section]");
      const savedDisplays=[];
      const EV_SECTIONS=["tasks","evidence","checklist"];
      panels.forEach((p,i)=>{
        savedDisplays[i]=p.style.display;
        if(mode==="all")p.style.display="block";
        else if(mode==="ev"){const s=p.getAttribute("data-wb-section");p.style.display=EV_SECTIONS.includes(s)?"block":"none";}
      });
      const hideFeedback=(mode!=="ev")&&!withFeedback;
      if(hideFeedback)document.querySelectorAll("[data-wb-feedback]").forEach(el=>{el.setAttribute("data-wb-feedback-hidden","true");el.style.display="none";});
      const evStrip=document.getElementById("ev-cover-strip");
      if(evStrip)evStrip.style.display=mode==="ev"?"block":"none";
      setTimeout(()=>{
        window.print();
        panels.forEach((p,i)=>{p.style.display=savedDisplays[i];});
        if(hideFeedback)document.querySelectorAll("[data-wb-feedback-hidden]").forEach(el=>{el.removeAttribute("data-wb-feedback-hidden");el.style.display="";});
        if(evStrip)evStrip.style.display="none";
      },300);
    },100);
  };

  return(
    <div style={{fontFamily:"'Segoe UI',system-ui,sans-serif",paddingBottom:70,background:"#f7f7f5",minHeight:"100vh"}}>
      <input type="file" accept=".json" ref={fileRef} onChange={importData} style={{display:"none"}}/>
      {importMsg&&(<div style={{position:"fixed",top:120,left:"50%",transform:"translateX(-50%)",background:importMsg.ok?G:"#c0392b",color:"#fff",padding:"10px 20px",borderRadius:8,fontSize:13,fontWeight:600,zIndex:999}}>{importMsg.ok?"✓ ":"✕ "}{importMsg.text}</div>)}

      {showPrintMenu&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setShowPrintMenu(false)}>
          <div style={{background:"#fff",borderRadius:12,padding:"28px 32px",minWidth:360,maxWidth:440,boxShadow:"0 8px 40px rgba(0,0,0,0.22)"}} onClick={e=>e.stopPropagation()}>
            <h2 style={{fontSize:18,fontWeight:700,color:"#1a3a2a",marginBottom:6}}>Print Workbook</h2>
            <p style={{fontSize:13,color:"#6b7280",marginBottom:20}}>Choose what to print.</p>
            <div style={{marginBottom:16}}>
              {[["all","Complete workbook","All sections including Knowledge Hub and activities"],
                ["current","Current section only","Prints only the section you are currently viewing"],
                ["ev","EV Summary — External Verification","Assessment tasks, photo evidence and checklist only — includes all assessor feedback."]
              ].map(([val,title,desc])=>(
                <label key={val} style={{display:"flex",alignItems:"flex-start",gap:10,fontSize:13,marginBottom:10,cursor:"pointer",padding:"10px 12px",borderRadius:8,
                  border:`${val==="ev"?"2":"1.5"}px solid ${printMode===val?(val==="ev"?"#1e40af":G):BD}`,background:printMode===val?(val==="ev"?"#eff6ff":"#f0fdf4"):"#fff"}}>
                  <input type="radio" name="printMode" checked={printMode===val} onChange={()=>setPrintMode(val)} style={{accentColor:val==="ev"?"#1e40af":G,marginTop:2}}/>
                  <div><div style={{fontWeight:val==="ev"?700:600,color:printMode===val&&val==="ev"?"#1e40af":"#374151"}}>{title}</div><div style={{fontSize:11,color:"#6b7280",marginTop:1}}>{desc}</div></div>
                </label>
              ))}
            </div>
            {printMode!=="ev"&&(<div style={{marginBottom:20,padding:"12px 14px",background:"#f0fdf4",borderRadius:8,border:"1px solid #bbf7d0"}}>

          <h2 style={{color:G,marginBottom:16,fontSize:22}}>Introduction</h2>
          <p style={{fontSize:14,color:"#2a2a2a",lineHeight:1.8,marginBottom:16}}>Welcome to your digital workbook for <strong>Unit MH12CY010 — Use a Map and Compass for a Route</strong>. This unit develops your practical navigation skills using OS maps and a protractor compass in the outdoors.</p>
          <KB title="Learning Outcomes" items={["LO1 — Understand the key features of maps and compasses.","LO2 — Be able to create a route card for an outdoor activity.","LO3 — Be able to complete the planned route."]}/>
          <KB title="How to use this workbook" items={["Use the navigation bar above to move between sections.","Read the Knowledge Hub in each section before answering questions.","Complete the LO activities first, then write up the formal Assessment Tasks.","Use the Photo Evidence tab to upload photos of your route card, map work, and route completion — AC 3.1 is a practical demonstration so evidence uploads are critical.","A plural statement requires a minimum of TWO examples."]}/>

        <div data-wb-section="lo1" style={{display:sec==="lo1"?"block":"none"}}>
          <LOHeader num={1} title="Understand the key features of maps and compasses"/>
          <KB title="Types of Maps" items={[
            "OS Explorer (1:25,000) — 4cm = 1km. Shows footpaths, field boundaries, walls. Best for walking and detailed navigation in the Welsh uplands.",
            "OS Landranger (1:50,000) — 2cm = 1km. Covers a larger area with less detail. Good for planning longer cycling or walking routes.",
            "Harvey Maps — lightweight and waterproof. Designed for mountain biking and mountain marathons such as routes at Afan Argoed and Coed y Brenin.",
            "Topographic maps — show relief using contour lines. Essential for understanding terrain before a route.",
            "Trail centre maps — simplified maps for specific networks. Good for on-trail navigation but not suitable for remote countryside.",
          ]}/>
          <KB title="Key Map Features" items={[
            "Scale: the ratio between map distance and ground distance. OS Explorer 1:25,000 means 4cm on map = 1km on ground.",
            "Contour lines: brown lines joining points of equal height. Close together = steep; far apart = gentle gradient.",
            "Grid lines and references: blue grid lines allow precise location using 6-figure or 8-figure grid references.",
            "Legend/Key: explains what symbols and colours represent — always check before using a new map.",
          ]}/>
          <KB title="The Protractor Compass — Key Parts" items={[
            "Baseplate — transparent rectangular plate with scale edges for measuring map distances.",
            "Bezel (rotating housing) — the circular ring marked 0–360°. Rotate this to set bearings.",
            "Compass needle — red end always points to magnetic north.",
            "Direction of travel arrow — on the baseplate, shows the direction you intend to walk.",
            "Orienting lines — lines inside the bezel that you align to map grid lines.",
            "Orienting arrow — inside the bezel; align the red compass needle to this when following a bearing ('red in shed').",
            "Index line — at the top of the bezel where you read off your bearing.",
          ]}/>
          <Divider/>
          <ACQ ac="1.1" label="Describe the purpose and features of at least TWO different types of maps used in outdoor activities.">

          </ACQ>
          <ACQ ac="1.2" label="Describe the features of a lightweight protractor compass. Include the name and purpose of each key part.">
            <TA rows={8} value={data.ac12_parts} onChange={upd("ac12_parts")} ph="Name and describe each part of a protractor compass — baseplate, bezel, needle, direction of travel arrow, orienting lines, orienting arrow, and index line. Explain what each is used for..." disabled={am}/>
          </ACQ>
          <AssessorFeedback label="LO 1 — Maps & Compasses" value={loFb("lo1")} onChange={v=>setLOFeedback("lo1",v)} assessorMode={am}/>
          {!am&&<ContinueBtn label="Continue to LO 2 →" onClick={()=>setSec("lo2")}/>}
        </div>

        <div data-wb-section="lo2" style={{display:sec==="lo2"?"block":"none"}}>
          <LOHeader num={2} title="Be able to create a route card"/>
          <KB title="What is a Route Card?" items={[
            "A route card is a written plan for a journey created BEFORE the route, left with a responsible person.",
            "Your route card must cover a minimum of FOUR HOURS of activity.",
            "At least one compass bearing must be included.",
            "Required elements: distance · height changes · route description · route direction · pace of group · stopping points · exit routes (min. 2) · points of interest · compass bearing.",
          ]}/>
          <KB title="How to Calculate a Bearing" items={[
            "1. Place the baseplate edge along the line from your position to your destination on the map.",
            "2. Rotate the bezel until the orienting lines are parallel to the north grid lines.",
            "3. Read the GRID bearing at the index line.",
            "4. Add the magnetic declination (~2° West in Wales) to get the MAGNETIC bearing.",
            "5. Hold compass flat, turn body until red needle aligns with orienting arrow — walk in the direction of the travel arrow.",
          ]}/>
          <KB title="Estimating Time — Naismith's Rule" items={[
            "Allow 1 hour per 5km of horizontal distance, plus 1 hour per 600m of ascent.",
            "Example: A 10km route with 300m of ascent = 2 hours + 30 minutes = 2 hours 30 minutes.",
            "Always add contingency time for group pace and rest stops.",
          ]}/>
          <Divider/>
          <ACQ ac="2.1" label="Create a route card for an outdoor activity of a minimum of FOUR HOURS. Include all required elements and at least one compass bearing.">

                <Inp label="Total Distance" value={data.ac21_distance} onChange={upd("ac21_distance")} ph="e.g. 12km" disabled={am}/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
                <Inp label="Total Height Changes" value={data.ac21_heightChanges} onChange={upd("ac21_heightChanges")} ph="e.g. 450m ascent, 450m descent" disabled={am}/>
                <Inp label="Overall Route Direction" value={data.ac21_direction} onChange={upd("ac21_direction")} ph="e.g. Circular from car park at GR SO012197" disabled={am}/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>

                <Inp label="Planned Stopping Points" value={data.ac21_stopping} onChange={upd("ac21_stopping")} ph="e.g. Summit at 2hrs, river crossing, café" disabled={am}/>
              </div>
            </div>

            <RouteTable rows={data.ac21_routeRows} onChange={v=>update({ac21_routeRows:v})} disabled={am}/>

            "You must complete the route planned in your route card — minimum four hours.",

          <p style={{fontSize:13,color:MG,marginBottom:20}}>These tasks produce your formal assessment evidence. Use your LO work to inform detailed answers here.</p>

          <div style={{border:`2px solid ${G}`,borderRadius:10,padding:18,marginBottom:22}}>
            <div style={{background:G,color:"#fff",padding:"7px 12px",borderRadius:6,fontSize:12,fontWeight:700,marginBottom:16,display:"inline-block"}}>Task 1 — Maps and Compasses &middot; AC 1.1, 1.2</div>
            <div style={{fontWeight:600,fontSize:14,color:"#1a1a1a",marginBottom:8}}>1.1 — Describe the purpose and features of different types of maps. Include at least TWO different map types.</div>

            <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:6,padding:"10px 14px",fontSize:12,color:"#166534",marginBottom:12}}>Required elements: distance · height changes · route description · route direction · pace of group · stopping points · exit routes · points of interest · compass bearing</div>
            <TA rows={6} value={data.t2_routeCard} onChange={upd("t2_routeCard")} ph="Confirm your route details and explain how each required element is addressed in your route card..." disabled={am}/>

          </div>

          <div style={{border:`2px solid ${G}`,borderRadius:10,padding:18,marginBottom:22}}>
            <div style={{background:G,color:"#fff",padding:"7px 12px",borderRadius:6,fontSize:12,fontWeight:700,marginBottom:16,display:"inline-block"}}>Task 3 — Route Completion &middot; AC 3.1, 3.2</div>
            <div style={{fontWeight:600,fontSize:14,color:"#1a1a1a",marginBottom:8}}>3.1 — Describe your route completion. Demonstrate the map and compass skills you used during the route.</div>
            <div style={{background:"#fff3cd",border:"1px solid #ffc107",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#856404",marginBottom:12}}>AC 3.1 requires practical demonstration. Assessor observation and photo/video evidence in the Evidence tab are essential.</div>
            <TA rows={8} value={data.t3_evidence} onChange={upd("t3_evidence")} ph="Describe in detail how you completed your planned route. Explain the map and compass skills you demonstrated..." disabled={am}/>
            <div style={{fontWeight:600,fontSize:14,color:"#1a1a1a",margin:"18px 0 8px"}}>3.2 — Review the timings and any alterations you made on the ground compared to your route card plan.</div>
            <TA rows={8} value={data.t3_review} onChange={upd("t3_review")} ph="Compare planned vs actual timings for each leg. Describe any alterations, why you made them, and what you would do differently next time..." disabled={am}/>
            <AssessorFeedback label="Task 3" value={taskFb("task3")} onChange={v=>setTaskFeedback("task3",v)} assessorMode={am}/>
          </div>
          {!am&&<ContinueBtn label="Continue to Photo Evidence →" onClick={()=>setSec("evidence")}/>}
        </div>

        <div data-wb-section="evidence" style={{display:sec==="evidence"?"block":"none"}}>
          <EvidenceSection items={data.evidence_items||[]} onUpdate={v=>update({evidence_items:v})} assessorMode={am}/>
          {!am&&<ContinueBtn label="Continue to Checklist →" onClick={()=>setSec("checklist")}/>}
        </div>

        <div data-wb-section="checklist" style={{display:sec==="checklist"?"block":"none"}}>
          <h2 style={{color:G,marginBottom:8,fontSize:22}}>Criteria Evidence Checklist</h2>
          <p style={{fontSize:13,color:MG,marginBottom:20}}>{am?"Mark each criterion using the toggles.":"Tick each box when you believe you have evidence for that criterion. Your assessor will verify."}</p>
          <div style={{border:`1px solid ${BD}`,borderRadius:10,overflow:"hidden",marginBottom:20}}>
            <div style={{background:G,color:"#fff",padding:"9px 14px",display:"grid",gridTemplateColumns:"55px 1fr 80px 100px",gap:8,fontSize:11,fontWeight:700}}>
              <div>AC</div><div>Criterion</div><div style={{textAlign:"center"}}>Self ✓</div><div style={{textAlign:"center"}}>Assessor</div>
            </div>
            {ACS.map((ac,i)=>{
              const status=acStatus(ac.id);
              return(
                <div key={ac.id} style={{background:i%2===0?"#fff":LGR,padding:"11px 14px",display:"grid",gridTemplateColumns:"55px 1fr 80px 100px",gap:8,alignItems:"center",borderBottom:`1px solid ${BD}`}}>
                  <div style={{fontWeight:700,color:G,fontSize:12}}>{ac.id}</div>
                  <div style={{fontSize:12,color:"#1a1a1a"}}>{ac.text}</div>
                  <div style={{display:"flex",justifyContent:"center"}} onClick={()=>{if(am)return;const c={...(data.checklist||{})};c[ac.id]=!c[ac.id];update({checklist:c});}}>
                    <div style={{width:22,height:22,border:`2px solid ${(data.checklist||{})[ac.id]?G:BD}`,borderRadius:5,background:(data.checklist||{})[ac.id]?G:"#fff",display:"flex",alignItems:"center",justifyContent:"center",cursor:am?"default":"pointer"}}>
                      {(data.checklist||{})[ac.id]&&<span style={{color:"#fff",fontSize:13,fontWeight:700}}>✓</span>}
                    </div>
                  </div>
                  <div style={{display:"flex",justifyContent:"center",gap:4}}>
                    {am?(
                      <>
                        <button onClick={()=>setACStatus(ac.id,status==="met"?"":"met")} style={{padding:"3px 8px",borderRadius:4,border:`1.5px solid ${status==="met"?G:BD}`,background:status==="met"?G:"#fff",color:status==="met"?"#fff":MG,fontSize:10,fontWeight:700,cursor:"pointer"}}>Met</button>
                        <button onClick={()=>setACStatus(ac.id,status==="notyet"?"":"notyet")} style={{padding:"3px 8px",borderRadius:4,border:`1.5px solid ${status==="notyet"?RED:BD}`,background:status==="notyet"?RED:"#fff",color:status==="notyet"?"#fff":MG,fontSize:10,fontWeight:700,cursor:"pointer"}}>NYM</button>
                      </>
                    ):(status?(
                      <span style={{fontSize:11,fontWeight:700,color:status==="met"?G:RED,padding:"3px 8px",borderRadius:4,background:status==="met"?LG:RED_LT,border:`1px solid ${status==="met"?G:RED}`}}>
                        {status==="met"?"✓ Met":"✕ NYM"}
                      </span>
                    ):null)}
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{background:am?ASSESSOR_LT:"#fff",border:`2px solid ${am?ASSESSOR_BD:BD}`,borderRadius:10,padding:18,marginBottom:20}}>
            <div style={{fontSize:14,fontWeight:700,color:am?ASSESSOR_BG:G,marginBottom:14}}>{am?"Assessor Sign-Off":"Result"}</div>
            {am&&(<>
              <div style={{fontSize:11,color:ASSESSOR_BG,fontWeight:700,marginBottom:6}}>Overall Result</div>
              <div style={{display:"flex",gap:10,marginBottom:16}}>
                {[["Pass",G],["Refer",RED],["Pending",AMBER]].map(([r,c])=>(
                  <button key={r} onClick={()=>update({overall_result:r})}
                    style={{padding:"8px 20px",borderRadius:7,border:`2px solid ${data.overall_result===r?c:BD}`,background:data.overall_result===r?c:"#fff",color:data.overall_result===r?"#fff":MG,fontSize:13,fontWeight:700,cursor:"pointer"}}>{r}</button>
                ))}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <Inp label="Assessor Signature (type name)" value={data.assessorSig} onChange={upd("assessorSig")}/>
                <Inp label="Date Marked" value={data.markedDate} onChange={upd("markedDate")} ph="DD/MM/YYYY"/>
              </div>
            </>)}
            {!am&&data.overall_result&&(
              <div style={{background:data.overall_result==="Pass"?LG:data.overall_result==="Refer"?RED_LT:AMBER_LT,border:`2px solid ${data.overall_result==="Pass"?G:data.overall_result==="Refer"?RED:AMBER}`,borderRadius:8,padding:"12px 16px",marginBottom:12}}>
                <div style={{fontSize:13,fontWeight:700,color:data.overall_result==="Pass"?G:data.overall_result==="Refer"?RED:AMBER}}>
                  {data.overall_result==="Pass"?"Result: PASS — Well done! All criteria have been met.":data.overall_result==="Refer"?"Result: REFER — Some criteria need more work. See assessor feedback below.":"Result: PENDING — Your assessor is still marking your work."}
                </div>
                {data.assessorSig&&<div style={{fontSize:12,color:MG,marginTop:4}}>Marked by: {data.assessorSig}{data.markedDate?` on ${data.markedDate}`:""}</div>}
              </div>
            )}
          </div>
          <div style={{background:"#fff",border:`1px solid ${BD}`,borderRadius:10,padding:18,marginBottom:20}}>
            <div style={{fontSize:14,fontWeight:700,color:G,marginBottom:14}}>Student Declaration</div>
            <p style={{fontSize:13,color:"#1a1a1a",marginBottom:16,lineHeight:1.7}}>I confirm that this work is my own and has not been copied from another person.</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <Inp label="Student Signature (type name)" value={data.studentSig} onChange={upd("studentSig")} disabled={am}/>
              <Inp label="Date" value={data.declarationDate} onChange={upd("declarationDate")} ph="DD/MM/YYYY" disabled={am}/>
            </div>
          </div>
          {!am&&<ContinueBtn label="Continue to Glossary →" onClick={()=>setSec("glossary")}/>}
        </div>

        <div data-wb-section="glossary" style={{display:sec==="glossary"?"block":"none"}}>
          <h2 style={{color:G,marginBottom:18,fontSize:22}}>Glossary</h2>
          <p style={{fontSize:13,color:MG,marginBottom:20}}>Key navigation terms for this unit.</p>
          <div style={{border:`1px solid ${BD}`,borderRadius:10,overflow:"hidden"}}>
            <div style={{background:G,color:"#fff",padding:"9px 14px",display:"grid",gridTemplateColumns:"200px 1fr",gap:16,fontSize:11,fontWeight:700}}>
              <div>Term</div><div>Definition</div>
            </div>
            {GLOSSARY.map(([term,def],i)=>(
              <div key={term} style={{background:i%2===0?"#fff":LGR,padding:"11px 14px",display:"grid",gridTemplateColumns:"200px 1fr",gap:16,borderBottom:`1px solid ${BD}`}}>
                <div style={{fontWeight:700,fontSize:13,color:G}}>{term}</div>
                <div style={{fontSize:13,color:"#1a1a1a",lineHeight:1.6}}>{def}</div>
              </div>
            ))}
          </div>
        </div>

      </div>

      <div style={{marginTop:40,padding:"16px 20px",borderTop:`1px solid ${BD}`,display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:11,color:MG}}>
        <span>MH12CY010 — Use a Map and Compass for a Route | Agored Cymru Level 2 | Jonathan Jones</span>
        {saved?<span style={{color:am?"#6ee7b7":G,fontWeight:700}}>✓ Changes saved</span>:<span>Auto-saving...</span>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
