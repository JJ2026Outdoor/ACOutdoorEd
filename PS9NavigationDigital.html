// ── AudioRecorder ────────────────────────────────────────────────
const AudioRecorder=({onSave,disabled=false})=>{
  const [state,setState]=useState("idle");
  const [secs,setSecs]=useState(0);
  const mrRef=useRef(null);
  const chunksRef=useRef([]);
  const timerRef=useRef(null);
  const start=async()=>{
    if(disabled)return;
    setState("requesting");
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      const mr=new MediaRecorder(stream);
      mrRef.current=mr; chunksRef.current=[];
      mr.ondataavailable=e=>{if(e.data.size>0)chunksRef.current.push(e.data)};
      mr.onstop=()=>{
        stream.getTracks().forEach(t=>t.stop());
        const blob=new Blob(chunksRef.current,{type:"audio/webm"});
        const reader=new FileReader();
        reader.onload=ev=>{onSave(ev.target.result,"recording.webm");setState("idle");setSecs(0)};
        reader.readAsDataURL(blob);
        setState("saving");
      };
      mr.start(); setState("recording"); setSecs(0);
      timerRef.current=setInterval(()=>setSecs(s=>s+1),1000);
    }catch(e){setState("idle");alert("Microphone access denied.")}
  };
  const stop=()=>{
    if(mrRef.current&&mrRef.current.state==="recording")mrRef.current.stop();
    clearInterval(timerRef.current);
  };
  const fmt=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
  if(disabled)return null;
  if(state==="idle")return(
    <button onClick={start} style={{background:NAVY_M,color:"white",border:"none",borderRadius:6,padding:"4px 10px",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M12 1a4 4 0 0 1 4 4v7a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm0 2a2 2 0 0 0-2 2v7a2 2 0 0 0 4 0V5a2 2 0 0 0-2-2zm-1 16.93V22h2v-2.07A8.001 8.001 0 0 0 20 12h-2a6 6 0 0 1-12 0H4a8.001 8.001 0 0 0 7 7.93z"/></svg>
      Record audio
    </button>
  );
  if(state==="requesting")return <span style={{fontSize:12,color:NAVY_M}}>Requesting microphone...</span>;
  if(state==="recording")return(
    <button onClick={stop} style={{background:RED,color:"white",border:"none",borderRadius:6,padding:"4px 10px",fontSize:12,cursor:"pointer",animation:"pulse 1.2s infinite",display:"flex",alignItems:"center",gap:6}}>
      <span style={{width:8,height:8,borderRadius:"50%",background:"white",display:"inline-block"}}/>
      Stop — {fmt(secs)}
    </button>
  );
  if(state==="saving")return <span style={{fontSize:12,color:NAVY_M}}>Saving...</span>;
  return null;
};

// ── TA (textarea with recorder) ──────────────────────────────────
const TA=({value,onChange,rows=4,ph="Write your answer here...",disabled=false,recordings,onAddRecording})=>{
  const updRec=(recOrNull,deleteId)=>{
    if(!onAddRecording)return;
    onAddRecording(recOrNull,deleteId);
  };
  return(
    <div>
      <textarea
        value={value||""} onChange={e=>!disabled&&onChange(e.target.value)}
        placeholder={disabled?"":ph} readOnly={disabled} rows={rows}
        style={{width:"100%",padding:"10px 12px",border:`1.5px solid ${disabled?"#ccc":"#b0bec5"}`,borderRadius:6,
          fontSize:14,lineHeight:1.6,background:disabled?"#f8f9fa":"white",color:disabled?"#666":"#1a1a2e",
          resize:"vertical",outline:"none",fontFamily:"inherit"}}/>
      {!disabled&&onAddRecording&&(
        <div style={{marginTop:4}}>
          <AudioRecorder disabled={disabled} onSave={(b64,name)=>updRec({b64,name,id:Date.now()},null)}/>
        </div>
      )}
      {recordings&&recordings.length>0&&(
        <div style={{marginTop:6,display:"flex",flexDirection:"column",gap:4}}>
          {recordings.map((r,i)=>(
            <div key={r.id||i} style={{display:"flex",alignItems:"center",gap:6,background:ASSESSOR_LT,border:`1px solid ${ASSESSOR_BD}`,borderRadius:6,padding:"4px 8px"}}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill={ASSESSOR_BD}><path d="M12 1a4 4 0 0 1 4 4v7a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4z"/><path d="M4 12a8 8 0 0 0 16 0"/></svg>
              <audio controls src={r.b64} style={{flex:1,height:28}}/>
              {!disabled&&<button onClick={()=>updRec(null,r.id)} style={{background:RED,color:"white",border:"none",borderRadius:4,width:22,height:22,cursor:"pointer",fontSize:14,lineHeight:1}}>&#215;</button>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

    const reader=new FileReader();

  // GPX handling
  const addGpxFile=(file)=>{
    if(!file||!file.name.toLowerCase().endsWith(".gpx"))return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const text=ev.target.result;
      // Parse basic GPX stats
      const parser=new DOMParser();
      const doc2=parser.parseFromString(text,"application/xml");
      const trkpts=doc2.querySelectorAll("trkpt");
      const wpts=doc2.querySelectorAll("wpt");
      const name=doc2.querySelector("name")?.textContent||file.name;
      let totalDist=0;
      let minEle=Infinity,maxEle=-Infinity;
      const pts=Array.from(trkpts).map(p=>({
        lat:parseFloat(p.getAttribute("lat")),
        lon:parseFloat(p.getAttribute("lon")),
        ele:parseFloat(p.querySelector("ele")?.textContent||0)
      }));
      for(let i=1;i<pts.length;i++){
        const R=6371000;
        const dLat=(pts[i].lat-pts[i-1].lat)*Math.PI/180;
        const dLon=(pts[i].lon-pts[i-1].lon)*Math.PI/180;
        const a=Math.sin(dLat/2)**2+Math.cos(pts[i-1].lat*Math.PI/180)*Math.cos(pts[i].lat*Math.PI/180)*Math.sin(dLon/2)**2;
        totalDist+=R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
        if(pts[i].ele<minEle)minEle=pts[i].ele;
        if(pts[i].ele>maxEle)maxEle=pts[i].ele;
      }
      let totalAscent=0;
      for(let i=1;i<pts.length;i++){const diff=pts[i].ele-pts[i-1].ele;if(diff>0)totalAscent+=diff;}
      const entry={
        id:Date.now(), name, fileName:file.name,
        points:pts.length, distance:totalDist,
        minEle:minEle===Infinity?null:minEle,
        maxEle:maxEle===-Infinity?null:maxEle,
        totalAscent,
        waypoints:wpts.length,
        rawB64:btoa(unescape(encodeURIComponent(text))),
        uploadedAt:new Date().toISOString()
      };
      update({gpx_files:[...(data.gpx_files||[]),entry]});
    };
    reader.readAsText(file);
  };

  const glossaryTerms=[
    ["Ordnance Survey (OS) map","An official, detailed map of Great Britain produced by the national mapping agency. Available in 1:25,000 and 1:50,000 scales."],
    ["Scale","The ratio between a distance on the map and the actual distance on the ground, e.g. 1:25,000."],
    ["Grid reference","A set of numbers used to pinpoint a location on an OS map. Four-figure identifies a 1 km² square; six-figure a 100 m area."],
    ["Easting","The vertical grid lines on an OS map, numbered from left to right (west to east). Always read first when giving a grid reference."],
    ["Northing","The horizontal grid lines on an OS map, numbered from bottom to top (south to north). Read second when giving a grid reference."],
    ["Contour line","A brown line on an OS map connecting all points at the same height above sea level. Interval typically 10 m on OS Explorer."],
    ["Naismith's Rule","A formula to estimate walking time: 1 hour per 5 km of flat distance, plus 1 hour per 600 m of ascent."],
    ["Route card","A planning document breaking a journey into legs, recording grid references, distances, height gain, timings and terrain notes."],
    ["Escape route","An alternative, safer path planned in advance in case the main route becomes hazardous."],
    ["Risk assessment","A process identifying potential hazards on a route, estimating likelihood and severity, and recording control measures."],
    ["Attack point","A clearly identifiable feature near your target used as a navigation aid when approaching a precise location."],
    ["Handrail feature","A linear feature on the map (wall, stream, track, fence) used as a guide to follow a route without constant reference to the compass."],
    ["Pacing","A navigation technique where you count double-steps to estimate distance covered on the ground."],
    ["STOP method","A decision-making process when lost: Stop, Think, Observe, Plan — to re-establish your position before moving."],
    ["Countryside Code","A set of guidelines for responsible behaviour in the countryside, covering litter, wildlife, gates, dogs and footpaths."],
    ["GPX file","GPS Exchange Format — a standard file type that stores route, track point and waypoint data recorded by GPS devices and apps."],
    ["Track point (trkpt)","An individual coordinate recorded at regular intervals by a GPS device, forming the track log of your route."],

  // ── SECTION ROUTER ────────────────────────────────────────────
  const renderSection=()=>{
    switch(section){
      case "cover":    return CoverSection;
      case "contents": return ContentsSection;
      case "intro":    return IntroSection;
      case "maps":     return MapsSection;
      case "scale":    return ScaleSection;
      case "grid":     return GridSection;
      case "contours": return ContoursSection;
      case "naismith": return NaismithSection;
      case "routecard":return RouteCardSection;
      case "risk":     return RiskSection;
      case "equipment":return EquipmentSection;
      case "navigation":return NavigationSection;
      case "quiz":     return QuizSection;
      case "taskA":    return TaskASection;
      case "taskB":    return TaskBSection;
      case "evidence": return EvidenceSection;
      case "checklist":return ChecklistSection;
      case "glossary": return GlossarySection;
      default:         return ContentsSection;
    }
  };

  return(
    <div>
      {Header}
      {section!=="cover"&&NavBar}
      {renderSection()}
      {AMModal}
      {PrintModal}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
