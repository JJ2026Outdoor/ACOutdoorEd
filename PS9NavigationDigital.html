// ── AudioRecorder ────────────────────────────────────────────────
const AudioRecorder=({onSave,disabled=false})=>{
  const [state,setState]=useState("idle");
  const [secs,setSecs]=useState(0);
  const mrRef=useRef(null);
  const chunksRef=useRef([]);
  const timerRef=useRef(null);
  const start=async()=>{
    if(disabled)return;
    setState("requesting");
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      const mr=new MediaRecorder(stream);
      mrRef.current=mr;chunksRef.current=[];
      mr.ondataavailable=e=>{if(e.data.size>0)chunksRef.current.push(e.data)};
      mr.onstop=()=>{
        stream.getTracks().forEach(t=>t.stop());
        const blob=new Blob(chunksRef.current,{type:"audio/webm"});
        const reader=new FileReader();
        reader.onload=ev=>{onSave(ev.target.result,"recording.webm");setState("idle");setSecs(0)};
        reader.readAsDataURL(blob);setState("saving");
      };
      mr.start();setState("recording");setSecs(0);
      timerRef.current=setInterval(()=>setSecs(s=>s+1),1000);
    }catch(e){setState("idle");alert("Microphone access denied.")}
  };
  const stop=()=>{
    if(mrRef.current&&mrRef.current.state==="recording")mrRef.current.stop();
    clearInterval(timerRef.current);
  };
  const fmt=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
  if(disabled)return null;
  if(state==="idle")return(
    <button onClick={start} style={{background:NAVY_M,color:"white",border:"none",borderRadius:6,padding:"4px 10px",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M12 1a4 4 0 0 1 4 4v7a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-1 16.93V22h2v-2.07A8.001 8.001 0 0 0 20 12h-2a6 6 0 0 1-12 0H4a8.001 8.001 0 0 0 7 7.93z"/></svg>
      Record audio
    </button>
  );
  if(state==="requesting")return <span style={{fontSize:12,color:NAVY_M}}>Requesting microphone...</span>;
  if(state==="recording")return(
    <button onClick={stop} style={{background:RED,color:"white",border:"none",borderRadius:6,padding:"4px 10px",fontSize:12,cursor:"pointer",animation:"pulse 1.2s infinite",display:"flex",alignItems:"center",gap:6}}>
      <span style={{width:8,height:8,borderRadius:"50%",background:"white",display:"inline-block"}}/>Stop — {fmt(secs)}
    </button>
  );
  if(state==="saving")return <span style={{fontSize:12,color:NAVY_M}}>Saving...</span>;
  return null;
};

const TA=({value,onChange,rows=4,ph="Write your answer here...",disabled=false,recordings,onAddRecording})=>(
  <div>
    <textarea value={value||""} onChange={e=>!disabled&&onChange(e.target.value)}
      placeholder={disabled?"":ph} readOnly={disabled} rows={rows}
      style={{width:"100%",padding:"10px 12px",border:`1.5px solid ${disabled?"#ccc":"#b0bec5"}`,borderRadius:6,
        fontSize:14,lineHeight:1.6,background:disabled?"#f8f9fa":"white",color:disabled?"#666":"#1a1a2e",
        resize:"vertical",outline:"none",fontFamily:"inherit"}}/>
    {!disabled&&onAddRecording&&(
      <div style={{marginTop:4}}>
        <AudioRecorder disabled={disabled} onSave={(b64,name)=>onAddRecording({b64,name,id:Date.now()},null)}/>
      </div>
    )}
    {recordings&&recordings.length>0&&(
      <div style={{marginTop:6,display:"flex",flexDirection:"column",gap:4}}>
        {recordings.map((r,i)=>(
          <div key={r.id||i} style={{display:"flex",alignItems:"center",gap:6,background:ASSESSOR_LT,border:`1px solid ${ASSESSOR_BD}`,borderRadius:6,padding:"4px 8px"}}>

            <audio controls src={r.b64} style={{flex:1,height:28}}/>
            {!disabled&&<button onClick={()=>onAddRecording(null,r.id)} style={{background:RED,color:"white",border:"none",borderRadius:4,width:22,height:22,cursor:"pointer",fontSize:14,lineHeight:1}}>&#215;</button>}
          </div>
        ))}
      </div>
    )}
  </div>
);

const GridDiagram=()=>{
  const cellSize=64;
  const gridW=6;
  const gridH=6;
  const offsetX=40;
  const offsetY=20;
  const svgW=offsetX+gridW*cellSize+10;
  const svgH=offsetY+gridH*cellSize+30;
  return(
    <div style={{overflowX:"auto",marginBottom:8}}>
      <svg width={svgW} height={svgH} style={{fontFamily:"Segoe UI,sans-serif",background:"#f8f9fa",border:`1px solid ${NAVY}`,borderRadius:6,display:"block"}}>
        {/* Grid fill */}
        <rect x={offsetX} y={offsetY} width={gridW*cellSize} height={gridH*cellSize} fill="#e8f4e8" stroke="none"/>
        {/* Grid lines */}
        {Array.from({length:gridW+1},(_,i)=>(
          <line key={"v"+i} x1={offsetX+i*cellSize} y1={offsetY} x2={offsetX+i*cellSize} y2={offsetY+gridH*cellSize}
            stroke={NAVY} strokeWidth={i===0||i===gridW?1.5:0.5} strokeOpacity={0.5}/>
        ))}
        {Array.from({length:gridH+1},(_,i)=>(
          <line key={"h"+i} x1={offsetX} y1={offsetY+i*cellSize} x2={offsetX+gridW*cellSize} y2={offsetY+i*cellSize}
            stroke={NAVY} strokeWidth={i===0||i===gridH?1.5:0.5} strokeOpacity={0.5}/>
        ))}
        {/* Easting labels (bottom) */}
        {Array.from({length:gridW},(_,i)=>(
          <text key={"e"+i} x={offsetX+i*cellSize+cellSize/2} y={offsetY+gridH*cellSize+18}
            textAnchor="middle" fontSize={11} fontWeight="700" fill={NAVY}>{32+i}</text>
        ))}
        {/* Northing labels (left) */}
        {Array.from({length:gridH},(_,i)=>(
          <text key={"n"+i} x={offsetX-6} y={offsetY+(gridH-1-i)*cellSize+cellSize/2+4}
            textAnchor="end" fontSize={11} fontWeight="700" fill={NAVY}>{51+i}</text>
        ))}
        {/* Axis labels */}
        <text x={offsetX+gridW*cellSize/2} y={offsetY+gridH*cellSize+28} textAnchor="middle" fontSize={10} fill="#666">Eastings →</text>
        {/* River decoration */}
        <path d={`M ${offsetX+2*cellSize+20} ${offsetY+3*cellSize+10} Q ${offsetX+2*cellSize+32} ${offsetY+3*cellSize+32} ${offsetX+2*cellSize+10} ${offsetY+3*cellSize+52}`}
          stroke="#0284c7" strokeWidth={3} fill="none" strokeLinecap="round"/>
        {/* Features */}
        {GRID_FEATURES.map(f=>{
          const x=offsetX+f.col*cellSize+cellSize/2;
          const y=offsetY+(5-f.row)*cellSize+cellSize/2;
          return(
            <g key={f.id}>
              <circle cx={x} cy={y} r={18} fill={f.color} fillOpacity={0.15} stroke={f.color} strokeWidth={1.5}/>

              <text x={x} y={y+22} textAnchor="middle" fontSize={9} fontWeight="700" fill={f.color}>{f.id.replace("g","")}</text>

          );
        })}
        {/* Title */}
        <text x={offsetX} y={offsetY-6} fontSize={10} fill="#666" fontWeight="600">Practice Map Grid — refer to the key below</text>

      {/* Key */}
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:8}}>

    </div>
  );
};

// ── Naismith Interactive Calculator ──────────────────────────────
const NaismithCalc=({calc,onChange,disabled})=>{
  const dist=parseFloat(calc.dist)||0;
  const height=parseFloat(calc.height)||0;
  const flatMins=dist>0?Math.round((dist/5)*60):null;
  const ascentMins=height>0?Math.round((height/600)*60):null;
  const totalMins=flatMins!==null&&ascentMins!==null?flatMins+ascentMins:null;
  const fmt=m=>`${Math.floor(m/60)}h ${m%60}min`;
  return(
    <div style={{background:"white",border:`2px solid ${GOLD}`,borderRadius:8,padding:16,margin:"10px 0"}}>
      <div style={{fontWeight:700,color:NAVY,fontSize:14,marginBottom:12}}>&#9881;  Interactive Naismith Calculator</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
        <div>
          <label style={{fontSize:12,color:"#666",display:"block",marginBottom:3}}>Distance (km)</label>
          <input type="number" min="0" step="0.1" value={calc.dist} onChange={e=>!disabled&&onChange({...calc,dist:e.target.value})}
            readOnly={disabled} placeholder="e.g. 7.5"
            style={{width:"100%",border:`1.5px solid ${GOLD}`,borderRadius:6,padding:"8px",fontSize:15,textAlign:"center"}}/>
        </div>
        <div>
          <label style={{fontSize:12,color:"#666",display:"block",marginBottom:3}}>Total ascent (metres)</label>
          <input type="number" min="0" step="10" value={calc.height} onChange={e=>!disabled&&onChange({...calc,height:e.target.value})}
            readOnly={disabled} placeholder="e.g. 200"
            style={{width:"100%",border:`1.5px solid ${GOLD}`,borderRadius:6,padding:"8px",fontSize:15,textAlign:"center"}}/>
        </div>
      </div>
      {totalMins!==null&&(
        <div style={{background:NAVY_L,borderRadius:8,padding:"12px 16px"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,textAlign:"center"}}>
            {[["Flat time",flatMins!==null?fmt(flatMins):"—",NAVY_M],
              ["Ascent time",ascentMins!==null?fmt(ascentMins):"—",GREEN],
              ["TOTAL",fmt(totalMins),NAVY]].map(([l,v,c])=>(
              <div key={l} style={{background:"white",borderRadius:6,padding:"8px",border:`2px solid ${c}`}}>
                <div style={{fontSize:10,color:"#666"}}>{l}</div>
                <div style={{fontSize:17,fontWeight:800,color:c}}>{v}</div>
              </div>
            ))}
          </div>
          <div style={{marginTop:8,fontSize:12,color:"#555",textAlign:"center"}}>
            {dist} km ÷ 5 = {(dist/5).toFixed(2)} hrs ({flatMins} min) &nbsp;+&nbsp; {height} m ÷ 600 = {(height/600).toFixed(2)} hrs ({ascentMins} min)
          </div>
        </div>
      )}
      {totalMins===null&&<div style={{fontSize:13,color:"#888",textAlign:"center",padding:8}}>Enter distance and ascent above to calculate</div>}
    </div>
  );
};

  const addEvidenceItem=()=>update({evidence_items:[...data.evidence_items,{id:Date.now(),desc:"",acs:[],mediaType:null,fileName:null,b64:null,objUrl:null,amStatus:"",amFeedback:""}]});
  const patchItem=(id,patch)=>update({evidence_items:data.evidence_items.map(it=>it.id===id?{...it,...patch}:it)});
  const removeItem=(id)=>update({evidence_items:data.evidence_items.filter(it=>it.id!==id)});
  const handleFile=(id,file)=>{
    if(!file)return;
    const isAudio=file.type.startsWith("audio");
    const reader=new FileReader();
    reader.onload=ev=>patchItem(id,{mediaType:isAudio?"audio":"image",fileName:file.name,b64:ev.target.result,objUrl:null});
    reader.readAsDataURL(file);
  };
  const addGpxFile=file=>{
    if(!file||!file.name.toLowerCase().endsWith(".gpx"))return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const text=ev.target.result;
      const parser=new DOMParser();
      const doc2=parser.parseFromString(text,"application/xml");
      const trkpts=doc2.querySelectorAll("trkpt");
      const wpts=doc2.querySelectorAll("wpt");
      const name=doc2.querySelector("name")?.textContent||file.name;
      const pts=Array.from(trkpts).map(p=>({
        lat:parseFloat(p.getAttribute("lat")),
        lon:parseFloat(p.getAttribute("lon")),
        ele:parseFloat(p.querySelector("ele")?.textContent||0)
      }));
      let totalDist=0,minEle=Infinity,maxEle=-Infinity,totalAscent=0;
      for(let i=1;i<pts.length;i++){
        const R=6371000,dLat=(pts[i].lat-pts[i-1].lat)*Math.PI/180,dLon=(pts[i].lon-pts[i-1].lon)*Math.PI/180;
        const a=Math.sin(dLat/2)**2+Math.cos(pts[i-1].lat*Math.PI/180)*Math.cos(pts[i].lat*Math.PI/180)*Math.sin(dLon/2)**2;
        totalDist+=R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
        if(pts[i].ele<minEle)minEle=pts[i].ele;
        if(pts[i].ele>maxEle)maxEle=pts[i].ele;
        const diff=pts[i].ele-pts[i-1].ele;if(diff>0)totalAscent+=diff;
      }
      update({gpx_files:[...(data.gpx_files||[]),{
        id:Date.now(),name,fileName:file.name,points:pts.length,distance:totalDist,
        minEle:minEle===Infinity?null:minEle,maxEle:maxEle===-Infinity?null:maxEle,
        totalAscent,waypoints:wpts.length,
        rawB64:btoa(unescape(encodeURIComponent(text))),
        uploadedAt:new Date().toISOString()
      }]});
    };
    reader.readAsText(file);
  };
  const removeGpx=id=>update({gpx_files:(data.gpx_files||[]).filter(g=>g.id!==id)});
  const downloadGpx=entry=>{
    const text=decodeURIComponent(escape(atob(entry.rawB64)));

      {/* Photo/audio items */}

        {data.evidence_items.map(it=>(
          <div key={it.id} style={{border:`1px solid ${NAVY_M}`,borderRadius:10,overflow:"hidden",background:"white"}}>
            <div style={{position:"relative"}}>
              <Thumb it={it}/>
              {!am&&<button onClick={()=>removeItem(it.id)} style={{position:"absolute",top:4,right:4,background:RED,color:"white",border:"none",borderRadius:"50%",width:22,height:22,fontSize:13,cursor:"pointer"}}>&#215;</button>}
            </div>
            {it.b64&&it.mediaType==="audio"&&<audio controls src={it.b64} style={{width:"100%",height:36,borderRadius:0}}/>}
            <div style={{padding:"10px 10px 8px"}}>
              {!am&&(
                <label style={{display:"block",background:NAVY_L,color:NAVY,padding:"5px 10px",borderRadius:5,fontSize:12,fontWeight:600,textAlign:"center",cursor:"pointer",marginBottom:6}}>
                  Upload photo/audio

  const glossaryTerms=[
    ["Ordnance Survey (OS) map","An official, detailed map of Great Britain produced by the national mapping agency. Available at 1:25,000 and 1:50,000 scales."],
    ["Scale","The ratio between a distance on the map and the actual distance on the ground, e.g. 1:25,000 means 1 cm on map = 250 m in real life."],
    ["Grid reference","A set of numbers used to pinpoint a location on an OS map. Four-figure identifies a 1 km² square; six-figure identifies a 100 m area."],
    ["Easting","The vertical grid lines on an OS map, numbered from left to right (west to east). Always read first when giving a grid reference."],
    ["Northing","The horizontal grid lines on an OS map, numbered from bottom to top (south to north). Read second when giving a grid reference."],
    ["Contour line","A brown line on an OS map connecting all points at the same height above sea level. Interval is typically 10 m on OS Explorer maps."],
    ["Naismith's Rule","A formula to estimate walking time: 1 hour per 5 km of flat distance, plus 1 hour per 600 m of ascent."],
    ["Route card","A planning document breaking a walk into legs, recording start/end grid references, distances, height gains, Naismith timings and terrain notes."],
    ["Escape route","An alternative, safer path planned in advance in case the main route becomes hazardous or the group needs to turn back."],
    ["Risk assessment","A process identifying potential hazards, estimating likelihood (1–5) and severity (1–5), and recording control measures to reduce risk."],
    ["Attack point","A clearly identifiable feature near your target used as a final navigation aid before locating a precise spot."],
    ["Handrail feature","A linear feature (wall, stream, track, fence) used to guide navigation direction without constant compass use."],
    ["Pacing","Counting double-steps to estimate distance on the ground. Roughly 65 double-paces = 100 m for most adults on flat ground."],
    ["STOP method","A decision-making process if lost: Stop — Think — Observe — Plan. Used to re-establish position before moving."],
    ["Countryside Code","Guidelines for responsible behaviour in the countryside: leave no trace, close gates, keep dogs controlled, respect wildlife and farmland."],
    ["GPX file","GPS Exchange Format — a standard file type storing route, track point, and waypoint data recorded by GPS devices and apps."],
    ["Track point (trkpt)","An individual GPS coordinate recorded at regular intervals, forming the track log of a route in a GPX file."],
    ["Legend / Key","The guide on an OS map explaining what each symbol and colour represents."],
    ["Spur","A ridge of high ground projecting outwards from a hill. Shown on a map as contour V-shapes pointing downhill."],
    ["Valley","A low-lying area between hills, often containing a stream. Shown on a map as contour V-shapes pointing uphill."],
  ];

      {/* Print modal */}
      {printModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:"white",borderRadius:12,padding:28,maxWidth:380,width:"90%"}}>
            <h3 style={{color:NAVY,fontWeight:800,marginBottom:12}}>Print Workbook</h3>
            <p style={{fontSize:13,color:"#555",marginBottom:16}}>Opens the browser print dialog. Formatted for A4.</p>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{window.print();setPrintModal(false);}} style={{flex:1,background:NAVY,color:"white",border:"none",borderRadius:7,padding:"10px",fontWeight:700,fontSize:14,cursor:"pointer"}}>Print</button>
              <button onClick={()=>setPrintModal(false)} style={{flex:1,background:"#f0f0f0",color:"#333",border:"none",borderRadius:7,padding:"10px",fontSize:14,cursor:"pointer"}}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
