/* ── Audio Recorder ────────────────────────────────── */
const AudioRecorder=({onSave,disabled=false})=>{
  const [state,setState]=useState("idle");
  const [secs,setSecs]=useState(0);
  const mrRef=useRef(null);
  const chunksRef=useRef([]);
  const timerRef=useRef(null);
  const start=async()=>{
    if(disabled)return;
    setState("requesting");
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      const mr=new MediaRecorder(stream);
      mrRef.current=mr; chunksRef.current=[];
      mr.ondataavailable=e=>{if(e.data.size>0)chunksRef.current.push(e.data)};
      mr.onstop=()=>{
        stream.getTracks().forEach(t=>t.stop());
        const blob=new Blob(chunksRef.current,{type:"audio/webm"});
        const reader=new FileReader();
        reader.onload=ev=>{onSave(ev.target.result,"recording.webm");setState("idle");setSecs(0)};
        reader.readAsDataURL(blob);
        setState("saving");
      };
      mr.start();setState("recording");setSecs(0);
      timerRef.current=setInterval(()=>setSecs(s=>s+1),1000);
    }catch(e){setState("idle");alert("Microphone access denied. Allow microphone access and try again.");}
  };
  const stop=()=>{
    if(mrRef.current&&mrRef.current.state==="recording")mrRef.current.stop();
    clearInterval(timerRef.current);
  };
  const fmt=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
  if(disabled)return null;
  if(state==="idle")return(
    <button onClick={start} title="Record audio answer"
      style={{marginTop:4,display:"flex",alignItems:"center",gap:5,padding:"5px 12px",
        background:BLUE_LT,border:`1px solid ${BLUE}`,borderRadius:5,color:BLUE,
        fontSize:12,fontWeight:600,cursor:"pointer"}}>
      <svg width="12" height="12" viewBox="0 0 24 24" fill={BLUE}><path d="M12 1a4 4 0 0 1 4 4v7a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-6 10a6 6 0 0 0 12 0h2a8 8 0 0 1-7 7.93V21h-2v-2.07A8 8 0 0 1 4 11h2z"/></svg>
      Record audio
    </button>
  );
  if(state==="requesting")return <span style={{fontSize:12,color:MG,marginTop:4,display:"block"}}>Requesting microphone…</span>;
  if(state==="recording")return(
    <button onClick={stop}
      style={{marginTop:4,display:"flex",alignItems:"center",gap:6,padding:"5px 12px",
        background:RED_LT,border:`1px solid ${RED}`,borderRadius:5,color:RED,
        fontSize:12,fontWeight:600,cursor:"pointer",animation:"pulse 1.2s infinite"}}>
      <span style={{width:8,height:8,borderRadius:"50%",background:RED,display:"inline-block"}}/>
      Stop — {fmt(secs)}
    </button>
  );
  if(state==="saving")return <span style={{fontSize:12,color:MG,marginTop:4,display:"block"}}>Saving…</span>;
  return null;
};

/* ── TA (textarea + audio) ─────────────────────────── */
const TA=({value,onChange,rows=5,ph="Write your answer here…",disabled=false,recordings,onAddRecording})=>{
  const hasRec=recordings&&recordings.length>0;
  return(
    <div>
      <textarea rows={rows} style={{background:disabled?"#F7F7F5":"#fff",color:disabled?"#6B6B6B":"#1A1A1A"}}
        value={value||""} onChange={e=>!disabled&&onChange(e.target.value)}
        placeholder={ph} readOnly={disabled}/>
      {!disabled&&onAddRecording&&(
        <AudioRecorder disabled={false}
          onSave={(b64,name)=>onAddRecording({b64,name,id:Date.now()})}/>
      )}
      {hasRec&&(
        <div style={{marginTop:6,display:"flex",flexDirection:"column",gap:4}}>
          {recordings.map((r,i)=>(

/* ══════════════════════════════════════════════════════
   MAIN APP
════════════════════════════════════════════════════════ */
function App(){
  const load=()=>{
    try{
      const saved=localStorage.getItem(UNIT_KEY);
      if(saved){const p=JSON.parse(saved);return {...init(),...p};}
    }catch(e){}
    return init();
  };
  const [data,setData]=useState(load);
  const [sec,setSec]=useState("cover");
  const [showPwd,setShowPwd]=useState(false);
  const [pwd,setPwd]=useState("");
  const [pwdErr,setPwdErr]=useState("");
  const [showPrint,setShowPrint]=useState(false);
  const [printMode,setPrintMode]=useState("full");
  const saveTimer=useRef(null);

  const update=useCallback(patch=>{
    setData(d=>{const n={...d,...patch};return n;});
  },[]);

  useEffect(()=>{
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{
      try{localStorage.setItem(UNIT_KEY,JSON.stringify(data));}catch(e){}
    },600);
  },[data]);

  const am=data.assessorMode;
  const upd=f=>v=>update({[f]:v});
  const updRec=fieldKey=>(recOrNull,deleteId)=>{
    const existing=data.recordings?.[fieldKey]||[];
    let updated;
    if(recOrNull===null){updated=existing.filter(r=>r.id!==deleteId);}
    else{updated=[...existing,recOrNull];}
    update({recordings:{...(data.recordings||{}),[fieldKey]:updated}});
  };
  const acStatus=id=>(data.ac_status||{})[id]||"";
  const setACStatus=(id,v)=>update({ac_status:{...(data.ac_status||{}),[id]:v}});
  const loFb=id=>(data.lo_feedback||{})[id]||"";
  const setLOFeedback=(id,v)=>update({lo_feedback:{...(data.lo_feedback||{}),[id]:v}});
  const taskFb=id=>(data.task_feedback||{})[id]||"";
  const setTaskFeedback=(id,v)=>update({task_feedback:{...(data.task_feedback||{}),[id]:v}});

  // Progress
  const allFields=["ac11_rows","ac13_text","ac14_rows","ac15_text","ac21_text","ac22_text","ac23_text",
    "ac31_text","ac32_rows","ac32_analysis","ac33_text","lo3_activity",
    "ac41_topic","ac41_content","ac41_method","ac42_text","lo4_activity"];
  const filled=allFields.filter(f=>{
    const v=data[f];
    if(Array.isArray(v))return v.some(r=>Object.values(r).some(x=>String(x||"").trim().length>2));
    return String(v||"").trim().length>2;
  }).length;
  const pct=Math.round((filled/allFields.length)*100);

  // Export
  const exportJSON=()=>{
    const exp={...data,_unit:UNIT_CODE,_exported:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(exp,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    const fn=`${UNIT_CODE}_${(data.studentName||"student").replace(/\s+/g,"_")}_workbook.json`;
    a.download=fn; a.click(); URL.revokeObjectURL(url);
  };
  const importJSON=e=>{
    const file=e.target.files[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const p=JSON.parse(ev.target.result);
        if(p._unit&&p._unit!==UNIT_CODE){alert(`Wrong workbook file. Expected ${UNIT_CODE}, got ${p._unit}.`);return;}
        setData({...init(),...p});alert("Workbook loaded successfully.");
      }catch(err){alert("Could not read file.");}
    };
    reader.readAsText(file);
    e.target.value="";
  };

  // Assessor
  const enterAM=()=>{
    if(pwd===ASSESSOR_PASS){update({assessorMode:true});setShowPwd(false);setPwd("");setPwdErr("");}
    else{setPwdErr("Incorrect password.");}
  };
  const exitAM=()=>update({assessorMode:false});

  // Print
  const doPrint=()=>{
    if(printMode==="ev"){
      document.getElementById("ev-cover-strip").style.display="block";
      window.print();
      setTimeout(()=>document.getElementById("ev-cover-strip").style.display="none",500);
    }else{window.print();}
    setShowPrint(false);
  };

  // Result colours
  const resultColour={
    "DISTINCTION":"#7c3aed","MERIT":BLUE,"PASS":G,"REFER":RED,"PENDING":MG
  };

  const headerBg=am?ASSESSOR_BG:G;

  /* ── Eco-systems table helpers ── */
  const updEco=(id,field,val)=>{
    update({ac11_rows:data.ac11_rows.map(r=>r.id===id?{...r,[field]:val}:r)});
  };
  const addEco=()=>update({ac11_rows:[...data.ac11_rows,mkEco()]});
  const removeEco=id=>data.ac11_rows.length>3?update({ac11_rows:data.ac11_rows.filter(r=>r.id!==id)}):null;

  /* ── Invasive species table helpers ── */
  const updInv=(id,field,val)=>update({ac14_rows:data.ac14_rows.map(r=>r.id===id?{...r,[field]:val}:r)});
  const addInv=()=>update({ac14_rows:[...data.ac14_rows,mkInv()]});
  const removeInv=id=>data.ac14_rows.length>2?update({ac14_rows:data.ac14_rows.filter(r=>r.id!==id)}):null;

  /* ── Travel/carbon table helpers ── */
  const CO2={
    "Private car (petrol)":0.19,"Private car (diesel)":0.17,"Electric car":0.05,
    "Minibus / coach":0.09,"Train":0.04,"Cycling":0,"Walking":0
  };
  const calcCarbon=row=>{
    const factor=CO2[row.mode]||0;
    const dist=parseFloat(row.distance_km)||0;
    const pax=parseFloat(row.passengers)||1;
    return(factor*dist*2/pax).toFixed(2); // return trip, per passenger
  };
  const updTravel=(id,field,val)=>update({ac32_rows:data.ac32_rows.map(r=>r.id===id?{...r,[field]:val}:r)});
  const addTravel=()=>update({ac32_rows:[...data.ac32_rows,mkTravel()]});
  const removeTravel=id=>data.ac32_rows.length>1?update({ac32_rows:data.ac32_rows.filter(r=>r.id!==id)}):null;
  const totalCarbon=()=>{
    return data.ac32_rows.reduce((sum,r)=>sum+(parseFloat(calcCarbon(r))||0),0).toFixed(2);
  };

  /* ── NAV ── */
  const navItems=[
    {id:"cover",label:"Cover"},
    {id:"contents",label:"Contents"},
    {id:"intro",label:"Introduction"},
    {id:"lo1",label:"LO 1"},
    {id:"lo2",label:"LO 2"},
    {id:"lo3",label:"LO 3"},
    {id:"lo4",label:"LO 4"},
    {id:"evidence",label:"Photo & Audio"},
    {id:"checklist",label:"Checklist"},
    {id:"glossary",label:"Glossary"},
  ];

  return(
    <div style={{minHeight:"100vh",background:"#f5f5f3"}}>
      {/* ── EV Cover Strip ── */}
      <div id="ev-cover-strip" style={{display:"none",background:DG,color:"#fff",
        padding:"16px 24px",marginBottom:12}}>
        <div style={{fontWeight:700,fontSize:16,marginBottom:6}}>
          EV SUMMARY — {UNIT_CODE} {UNIT_TITLE}
        </div>
        <div style={{fontSize:13,display:"flex",gap:24,flexWrap:"wrap"}}>
          <span>Student: <strong>{data.studentName||"—"}</strong></span>
          <span>Class: <strong>{data.className||"—"}</strong></span>
          <span>Assessor: <strong>{data.assessorName||"—"}</strong></span>
          <span>Started: <strong>{data.startDate||"—"}</strong></span>
          <span>Result: <strong>{data.overall_result||"PENDING"}</strong></span>
          <span>Marked: <strong>{data.markedDate||"—"}</strong></span>
          <span>Exported: <strong>{new Date().toLocaleDateString("en-GB")}</strong></span>
        </div>
      </div>

      {/* ── HEADER BAR 1 ── */}
      <div className="wb-header no-print" style={{position:"sticky",top:0,zIndex:100,
        background:headerBg,color:"#fff",padding:"0 16px",height:56,
        display:"flex",alignItems:"center",justifyContent:"space-between",
        boxShadow:"0 2px 8px rgba(0,0,0,.15)",transition:"background .3s"}}>
        <div style={{display:"flex",flexDirection:"column",lineHeight:1.2}}>
          <span style={{fontWeight:700,fontSize:14}}>{UNIT_CODE} — {UNIT_TITLE}</span>
          <span style={{fontSize:11,opacity:.8}}>{UNIT_SUBTITLE}</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <img src={LOGO_SRC} alt="Brynllywarch" style={{height:34,objectFit:"contain"}}/>

            {!am&&<ContinueBtn label="Continue to LO 2 →" onClick={()=>setSec("lo2")}/>}
          </div>

        {/* ══════════════════════════════════════
            LO 2 — ENVIRONMENTAL RESPONSIBILITY
        ══════════════════════════════════════ */}
        {sec==="lo2"&&(
          <div className="wb-section">
            <LOHeader num={2} title="Understand the Importance of Environmental Responsibility"/>
            <KB title="What is Environmental Responsibility?" items={[
              "Acting in ways that minimise harm to the natural environment and actively preserve it for future generations. In the context of outdoor activities, this means considering the impact of access, travel, equipment, noise, waste, and habitat disturbance.",
              "<strong>Leave No Trace (LNT)</strong> — seven principles for minimising impact: Plan ahead; travel on durable surfaces; dispose of waste properly; leave what you find; minimise fire impacts; respect wildlife; be considerate of others.",
              "The <strong>Countryside Code (Wales)</strong> guides walkers, cyclists and land managers on responsible access to the countryside.",
              "Environmental responsibility is not just about legal compliance — it reflects an ethical commitment to the long-term health of ecosystems.",
            ]}/>
            <KB title="How Environmental Irresponsibility Affects Biodiversity" items={[
              "<strong>Soil compaction &amp; erosion:</strong> Heavy foot and bike traffic compresses soil, destroying plant root systems, reducing water infiltration and causing gully erosion which carries sediment into watercourses.",
              "<strong>Disturbance to nesting birds:</strong> Ground-nesting species (curlew, lapwing, red grouse, ring ouzel) will abandon nests if disturbed by dogs or walkers during the breeding season (March–July).",
              "<strong>Water pollution:</strong> Fuel spills from watercraft, litter, and improper waste disposal harm aquatic macroinvertebrates, fish and riparian species.",
              "<strong>Spread of invasive species:</strong> Seeds attach to footwear and clothing; aquatic invasives transfer on wet equipment between water bodies.",
              "<strong>Trampling of sensitive habitats:</strong> Blanket bog, alpine heath and sand dunes are slow to recover — a single footstep on dry sphagnum moss can take decades to recover.",
              "<strong>Light and noise pollution:</strong> Headtorches and campfire noise disturb nocturnal wildlife, disrupt breeding behaviours and cause physiological stress.",
            ]}/>
            <KB title="Welsh Legislation — Environmental Protection" items={[
              "<strong>Environment (Wales) Act 2016</strong> — A landmark Welsh law placing a statutory duty on public bodies to maintain and enhance biodiversity, and introducing the concept of a Resilient Ecological Network for Wales. Closely linked to the Well-being of Future Generations Act.",
              "<strong>Countryside and Rights of Way (CRoW) Act 2000</strong> — Establishes the right to roam on mapped open access land in England and Wales; also significantly strengthens protection for Sites of Special Scientific Interest (SSSIs).",
              "<strong>Wildlife and Countryside Act 1981 (as amended)</strong> — Protects listed species (birds, bats, great crested newts, red squirrels, etc.) and their habitats. Makes it illegal to intentionally disturb nesting birds or damage an SSSI.",
              "<strong>Well-being of Future Generations (Wales) Act 2015</strong> — Requires all public bodies to consider the long-term environmental and social impact of their decisions. Establishes seven well-being goals including 'A Resilient Wales'.",
              "<strong>Natural Resources Wales (NRW)</strong> (created by the Natural Resources Body for Wales (Establishment) Order 2012) — The body responsible for managing and protecting Wales&apos;s natural environment. Created by merging the Countryside Council for Wales, Environment Agency Wales and Forestry Commission Wales.",
              "<strong>NGB campaigns</strong> — e.g. British Mountaineering Council (BMC) Environmental Statement; Surfers Against Sewage; Leave No Trace Wales.",
            ]}/>
            <ResearchLinks items={[
              ["The Countryside Code — Natural Resources Wales","https://naturalresourceswales.gov.uk/days-out/the-countryside-codes/the-countryside-code/","Responsible access and environmental behaviour outdoors in Wales"],
              ["Leave No Trace UK","https://lnt.org.uk","Seven principles for minimising environmental impact in the outdoors"],
              ["legislation.gov.uk — Environment (Wales) Act 2016","https://www.legislation.gov.uk/anaw/2016/3/contents","Full text of the landmark Welsh environmental protection legislation"],
              ["NRW — Biodiversity and Ecosystems Guidance","https://naturalresourceswales.gov.uk/guidance-and-advice/environmental-topics/biodiversity-and-ecosystems/","How Welsh law and policy protects biodiversity"],
              ["British Mountaineering Council — Environment","https://www.thebmc.co.uk/environment","NGB environmental policies and responsible access guidance"],
            ]}/>
            <div style={{height:2,background:LG,borderRadius:2,margin:"22px 0"}}/>
            <div style={{background:DG,color:"#fff",borderRadius:6,padding:"8px 14px",
              fontSize:12,fontWeight:700,marginBottom:16,letterSpacing:".05em",textTransform:"uppercase"}}>

            </div>
            <ACQ ac="2.1" am={am}
              label="Summarise what the term 'environmental responsibility' means in relation to participating in outdoor activities.">

              <TA value={data.ac21_text} onChange={upd("ac21_text")} rows={6}

                disabled={am} recordings={data.recordings?.ac21_text||[]}

            </ACQ>
            <ACQ ac="2.2" am={am}
              label="Explain how environmental irresponsibility can affect biodiversity. Give at least TWO specific, detailed examples.">
              <Hint text="Focus on the mechanisms — how does the irresponsible action lead to a reduction in biodiversity? Be specific: name the habitat or species affected, describe the cause-and-effect chain. Minimum TWO examples."/>
              <TA value={data.ac22_text} onChange={upd("ac22_text")} rows={7}
                ph="Example 1: [The irresponsible action] leads to… which affects biodiversity by…&#10;&#10;Example 2: …"
                disabled={am} recordings={data.recordings?.ac22_text||[]}
                onAddRecording={updRec("ac22_text")}/>
              {am&&<ACStatus id="2.2" status={acStatus("2.2")} onChange={v=>setACStatus("2.2",v)}/>}
            </ACQ>
            <ACQ ac="2.3" am={am}
              label="Explain the Welsh legislation applicable to the protection of the environment. Reference at least TWO pieces of legislation and explain their significance.">
              <Hint text="For each piece of legislation: name it (with year), describe its main purpose, and explain what it specifically protects or requires. You may also include reference to NGB environmental campaigns. Minimum TWO pieces of legislation."/>

                ph="Legislation 1 — [Name + Year]:&#10;Purpose and significance: …&#10;&#10;Legislation 2 — [Name + Year]:&#10;Purpose and significance: …"
                disabled={am} recordings={data.recordings?.ac23_text||[]}
                onAddRecording={updRec("ac23_text")}/>
              {am&&<ACStatus id="2.3" status={acStatus("2.3")} onChange={v=>setACStatus("2.3",v)}/>}
            </ACQ>
            <AssessorFeedback label="LO 2 — Environmental Responsibility" value={loFb("lo2")} onChange={v=>setLOFeedback("lo2",v)} assessorMode={am}/>
            {!am&&<ContinueBtn label="Continue to LO 3 →" onClick={()=>setSec("lo3")}/>}
          </div>

        {/* ══════════════════════════════════════
            LO 3 — CARBON FOOTPRINTS
        ══════════════════════════════════════ */}
        {sec==="lo3"&&(
          <div className="wb-section">
            <LOHeader num={3} title="Understand Carbon Footprints"/>
            <GroupNote/>
            <KB title="What is a Carbon Footprint?" items={[
              "A <strong>carbon footprint</strong> is the total amount of greenhouse gases (measured in kg or tonnes of CO₂ equivalent, CO₂e) produced directly and indirectly by an activity, person, event, or organisation.",
              "For a group outdoor activity, the main sources are: <strong>travel</strong> to/from the venue, <strong>equipment</strong> manufacturing and maintenance, <strong>food</strong>, and <strong>accommodation</strong>. Travel usually dominates.",
              "Greenhouse gases include CO₂ (combustion), CH₄ (methane — livestock, landfill) and N₂O (nitrous oxide — agriculture). They trap heat in the atmosphere, driving climate change.",
            ]}/>
            <KB title="Carbon Zero vs Carbon Neutral" items={[
              "<strong>Carbon zero (net zero)</strong> means that the amount of greenhouse gas emitted is matched by the amount removed from the atmosphere — either by not emitting it (zero-carbon energy, active travel) or by offsetting through certified schemes (tree-planting, carbon capture).",
              "<strong>Zero carbon</strong> (strict definition) means genuinely emitting no carbon at all — e.g. cycling or walking to the venue, using renewable energy only.",
              "<strong>Carbon neutral</strong> typically relies on offsetting to balance emissions, rather than eliminating them. This is a weaker standard than zero carbon.",
              "The Welsh Government aims for net zero by 2050. Many outdoor governing bodies have signed climate pledges targeting carbon reduction.",
            ]}/>
            <KBTable title="Approximate CO₂ Emissions by Travel Mode" headers={["Mode","CO₂ per passenger-km","Notes"]} rows={[
              ["Private car (petrol)","~0.19 kg CO₂","Most common; higher per person unless car is full"],
              ["Private car (diesel)","~0.17 kg CO₂","Slightly lower than petrol per km"],
              ["Electric car","~0.05 kg CO₂","Depends on grid electricity source"],
              ["Minibus / coach","~0.09 kg CO₂","Significantly lower per person than private car"],
              ["Train","~0.04 kg CO₂","Lowest motorised option; varies by route"],
              ["Cycling","~0 kg CO₂","Zero operational emissions"],
              ["Walking","~0 kg CO₂","Zero operational emissions"],
            ]}/>
            <KB title="The MacKay Carbon Calculator" items={[
              "The <strong>MacKay Carbon Calculator</strong> (available via the Royal Geographical Society — rgs.org) is a free tool for schools to calculate the carbon footprint of a class or group trip.",
              "It accounts for travel mode, distance, group size, accommodation, and food choices.",
              "Your assessor may ask you to use this tool for AC 3.2 — check with them whether they would like you to use it alongside the table below.",
            ]}/>
            <KB title="Ways to Reduce Carbon Footprint in Outdoor Activities" items={[
              "Travel by minibus, coach or train instead of individual private cars — <em>consolidation</em> dramatically reduces per-person emissions.",
              "Choose activity venues accessible by public transport or within walking/cycling distance.",
              "Purchase second-hand outdoor equipment where possible — manufacturing gear is carbon-intensive.",
              "Choose plant-based meal options on expeditions — livestock food production generates significant methane.",
              "Offset unavoidable carbon through certified schemes (e.g. Gold Standard, Woodland Trust).",
              "Use renewable energy sources for base accommodation and cooking.",
              "Reduce disposable packaging — bring reusable water bottles, avoid single-use plastic.",
            ]}/>
            <ResearchLinks items={[
              ["MacKay Carbon Calculator (Royal Geographical Society)","https://www.rgs.org/schools/teaching-resources/mackay-carbon-calculator/","Free tool for calculating the carbon footprint of a school/group trip"],
              ["Carbon Footprint Ltd — Calculator","https://www.carbonfootprint.com/calculator.aspx","Online CO₂ calculator covering travel, food, and lifestyle"],
              ["Climate Change Committee — UK Progress","https://www.theccc.org.uk","Independent advice on meeting the UK Net Zero target"],
              ["Welsh Government — Climate Change","https://www.gov.wales/climate-change","Wales-specific net zero targets, policy and progress"],
              ["BBC Climate Change — What is Net Zero?","https://www.bbc.co.uk/news/science-environment-52719662","Accessible explainer on net zero and carbon neutral terminology"],
            ]}/>
            <div style={{height:2,background:LG,borderRadius:2,margin:"22px 0"}}/>
            <div style={{background:DG,color:"#fff",borderRadius:6,padding:"8px 14px",
              fontSize:12,fontWeight:700,marginBottom:16,letterSpacing:".05em",textTransform:"uppercase"}}>
              Assessment Tasks — LO 3
            </div>
            <div style={{marginBottom:14}}>
              <Inp label="Outdoor Activity for this assessment" value={data.lo3_activity}
                onChange={upd("lo3_activity")} ph="e.g. Hill walking, mountain biking, canoeing…" disabled={am}/>
              <Inp label="Group members (names or number)" value={data.lo3_members}
                onChange={upd("lo3_members")} ph="e.g. 12 students + 2 staff" disabled={am}/>
            </div>
            <ACQ ac="3.1" am={am} label="Explain the term 'carbon zero'. Include the distinction between carbon zero, net zero, and carbon neutral in your answer.">
              <Hint text="At Level 3 a clear, precise explanation is expected. Define each term and explain what makes them different. Use examples relevant to outdoor activities if possible."/>
              <TA value={data.ac31_text} onChange={upd("ac31_text")} rows={5}
                ph="Carbon zero means… Net zero means… Carbon neutral refers to… The key differences are…"
                disabled={am} recordings={data.recordings?.ac31_text||[]}
                onAddRecording={updRec("ac31_text")}/>
              {am&&<ACStatus id="3.1" status={acStatus("3.1")} onChange={v=>setACStatus("3.1",v)}/>}
            </ACQ>

            <ACQ ac="3.2" am={am} label="Assess the carbon footprint of the group travelling to the outdoor activity. Calculate travel emissions and analyse the overall impact.">
              <Hint text="Complete the travel data table below for each group member (or travel party). The table auto-calculates estimated CO₂ based on mode and distance. You should then write a short analysis (AC 3.2 summary box) interpreting the total and identifying the biggest contributors. Emissions shown are estimates — your assessor may also direct you to use the MacKay Carbon Calculator (rgs.org)."/>
              <div style={{overflowX:"auto",marginBottom:10}}>
                <table className="data-tbl">
                  <thead><tr>
                    <th>Name / Travel Party</th>
                    <th>Travel Mode</th>
                    <th>Distance (km, one way)</th>
                    <th>Passengers in vehicle</th>
                    <th>Estimated CO₂ (return, kg)</th>
                    {!am&&<th></th>}
                  </tr></thead>
                  <tbody>
                    {data.ac32_rows.map(row=>(
                      <tr key={row.id}>
                        <td><input type="text" value={row.name||""} disabled={am}
                          onChange={e=>updTravel(row.id,"name",e.target.value)}
                          placeholder="Name or group"/></td>
                        <td>
                          {am?<span style={{fontSize:12}}>{row.mode||"—"}</span>:(
                            <select value={row.mode||""} disabled={am}
                              onChange={e=>updTravel(row.id,"mode",e.target.value)}
                              style={{width:"100%",padding:"5px 6px",border:"1px solid #D4D4CC",
                                borderRadius:4,fontSize:12,background:"#fff"}}>
                              <option value="">Select…</option>
                              {Object.keys(CO2).map(m=><option key={m} value={m}>{m}</option>)}
                            </select>
                          )}
                        </td>
                        <td><input type="text" value={row.distance_km||""} disabled={am}
                          onChange={e=>updTravel(row.id,"distance_km",e.target.value)}
                          placeholder="km"/></td>
                        <td><input type="text" value={row.passengers||""} disabled={am}
                          onChange={e=>updTravel(row.id,"passengers",e.target.value)}
                          placeholder="1"/></td>
                        <td style={{fontWeight:700,color:G,textAlign:"center"}}>
                          {row.mode&&row.distance_km?calcCarbon(row)+" kg":"—"}
                        </td>
                        {!am&&<td>
                          {data.ac32_rows.length>1&&<button onClick={()=>removeTravel(row.id)}
                            style={{background:"none",border:"none",color:RED,cursor:"pointer",fontSize:14}}>✕</button>}
                        </td>}
                      </tr>
                    ))}
                  </tbody>
                  <tfoot>
                    <tr style={{background:LG}}>
                      <td colSpan={4} style={{fontWeight:700,textAlign:"right",color:DG}}>Total estimated CO₂:</td>
                      <td style={{fontWeight:800,color:G,textAlign:"center"}}>{totalCarbon()} kg</td>
                      {!am&&<td></td>}
                    </tr>
                  </tfoot>
                </table>
              </div>
              {!am&&<button onClick={addTravel}
                style={{background:LG,border:`1px solid ${G}`,color:G,borderRadius:5,
                  padding:"5px 12px",fontSize:12,fontWeight:600,cursor:"pointer",marginBottom:10}}>
                + Add row
              </button>}
              <div style={{fontSize:12,fontWeight:600,color:MG,marginTop:10,marginBottom:5,
                textTransform:"uppercase",letterSpacing:".04em"}}>
                Assessment: Analyse your group&apos;s carbon footprint
              </div>
              <TA value={data.ac32_analysis} onChange={upd("ac32_analysis")} rows={5}
                ph="Analyse the total carbon footprint calculated above. Which travel mode or person contributed most? How does this compare to alternatives? What does this mean for the group's environmental impact?…"
                disabled={am} recordings={data.recordings?.ac32_analysis||[]}
                onAddRecording={updRec("ac32_analysis")}/>
              {am&&<ACStatus id="3.2" status={acStatus("3.2")} onChange={v=>setACStatus("3.2",v)}/>}
            </ACQ>

            <ACQ ac="3.3" am={am} label="Explain at least THREE specific ways in which the group could reduce their carbon footprint for this activity.">
              <Hint text="Be specific to your group and activity. Generic answers ('use less energy') are not sufficient at Level 3. Explain each method and why it would reduce the footprint. Minimum THREE ways."/>
              <TA value={data.ac33_text} onChange={upd("ac33_text")} rows={7}
                ph="Way 1: …&#10;&#10;Way 2: …&#10;&#10;Way 3: …"
                disabled={am} recordings={data.recordings?.ac33_text||[]}
                onAddRecording={updRec("ac33_text")}/>
              {am&&<ACStatus id="3.3" status={acStatus("3.3")} onChange={v=>setACStatus("3.3",v)}/>}
            </ACQ>
            <AssessorFeedback label="LO 3 — Carbon Footprints" value={loFb("lo3")} onChange={v=>setLOFeedback("lo3",v)} assessorMode={am}/>
            {!am&&<ContinueBtn label="Continue to LO 4 →" onClick={()=>setSec("lo4")}/>}
          </div>
        )}

        {/* ══════════════════════════════════════
            LO 4 — RAISING AWARENESS
        ══════════════════════════════════════ */}
        {sec==="lo4"&&(
          <div className="wb-section">
            <LOHeader num={4} title="Raise Awareness of the Impact of Outdoor Activities on the Environment"/>
            <GroupNote/>
            <KB title="What Makes an Effective Awareness Campaign?" items={[
              "A strong campaign has a <strong>clear, specific message</strong> — not just 'be more sustainable' but 'reduce single-use plastic on local trails by 50% this year'.",
              "<strong>Target audience:</strong> Who are you trying to reach? Younger students, parents, the local community, activity providers? The tone, format and channels should match.",
              "<strong>Evidence base:</strong> Ground your campaign in facts and local data — e.g. species counts, pollution statistics, NRW reports. This adds credibility.",
              "<strong>Call to action:</strong> What do you want your audience to DO? Sign a pledge, change a behaviour, share content? A specific ask is more effective than general awareness.",
              "<strong>Measurable impact:</strong> How will you know if your campaign worked? Views, pledges taken, behaviour changes, follow-up survey?",
            ]}/>
            <KB title="Campaign Format Options" items={[
              "<strong>Presentation to peer group or assembly:</strong> High impact, interactive, allows Q&A. Prepare visuals and key facts.",
              "<strong>Social media campaign:</strong> Instagram/TikTok short video, infographic, photo series with captions. Wide reach; consider which platforms your audience uses.",
              "<strong>Poster display:</strong> Placed at school, outdoor centre, trailhead. Good for community reach. Design must be visually engaging.",
              "<strong>Webpage / blog:</strong> Searchable, detailed, can include links, embedded video, interactive elements.",
              "<strong>Short documentary film:</strong> Combines visual evidence, interview and narration. High production value but time-intensive.",
              "<strong>Leaflet at activity venue:</strong> Targeted at participants; direct and practical.",
            ]}/>
            <KB title="Reflection Framework — Gibbs Reflective Cycle" items={[
              "<strong>1. Description:</strong> What happened? What did you do and observe?",
              "<strong>2. Feelings:</strong> What were you thinking and feeling during and after?",
              "<strong>3. Evaluation:</strong> What went well? What did not go as planned?",
              "<strong>4. Analysis:</strong> Why did it go well or badly? What factors affected the outcome?",
              "<strong>5. Conclusion:</strong> What else could you have done? What have you learned?",
              "<strong>6. Action plan:</strong> If you did this again, what would you do differently?",
              "A strong AC 4.2 reflection will move beyond description ('it went well') to genuine analysis of impact ('the feedback forms showed 7 out of 10 students said they would change their travel behaviour').",
            ]}/>
            <ResearchLinks items={[
              ["Keep Wales Tidy — Campaigns","https://www.keepwalestidy.cymru","Welsh environmental campaigns; useful for campaign research and inspiration"],
              ["Surfers Against Sewage — Campaigns","https://www.sas.org.uk/our-campaigns/","Model environmental awareness campaigns with measurable impact"],
              ["NRW — How You Can Help Wildlife","https://naturalresourceswales.gov.uk/days-out/things-to-do/wildlife-watching/","Welsh-context actions for protecting the natural environment"],
              ["Canva (for campaign design)","https://www.canva.com","Free graphic design tool for creating posters, infographics and social media content"],
              ["Gibbs Reflective Cycle — University of Edinburgh","https://www.ed.ac.uk/reflection/reflectors-toolkit/reflecting-on-experience/gibbs-reflective-cycle","Detailed guide to using Gibbs for structured reflection (AC 4.2)"],
            ]}/>
            <div style={{height:2,background:LG,borderRadius:2,margin:"22px 0"}}/>
            <div style={{background:DG,color:"#fff",borderRadius:6,padding:"8px 14px",
              fontSize:12,fontWeight:700,marginBottom:16,letterSpacing:".05em",textTransform:"uppercase"}}>

            <div style={{background:"#fff",border:`1.5px solid ${BD}`,borderRadius:8,

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <Inp label="Outdoor activity selected" value={data.lo4_activity}
                  onChange={upd("lo4_activity")} ph="e.g. mountain biking, wild swimming…" disabled={am}/>
                <Inp label="Group members involved" value={data.lo4_group}
                  onChange={upd("lo4_group")} ph="Names or number" disabled={am}/>
              </div>
            </div>

            <ACQ ac="4.1" am={am} label="Deliver a campaign plan to raise awareness of the impact of your selected outdoor activity on the natural environment.">
              <Hint text="Your campaign plan should be detailed and practical. Include: (1) the specific environmental issue you are addressing, (2) your target audience, (3) the format and channel you will use, (4) the content and key messages, (5) your delivery date/method. You should also upload or describe any materials you have created (use the Photo & Audio Evidence section for posters, videos, etc.)."/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
                <Inp label="Campaign topic / focus" value={data.ac41_topic}
                  onChange={upd("ac41_topic")}
                  ph="e.g. Reducing trail erosion from mountain biking…" disabled={am}/>
                <Inp label="Target audience" value={data.ac41_audience}
                  onChange={upd("ac41_audience")} ph="e.g. Year 9 students, local club members…" disabled={am}/>
                <Inp label="Format / channel" value={data.ac41_method}
                  onChange={upd("ac41_method")} ph="e.g. School assembly presentation, Instagram…" disabled={am}/>
                <Inp label="Planned / actual delivery date" value={data.ac41_date}
                  onChange={upd("ac41_date")} type="date" disabled={am}/>
              </div>
              <div style={{fontSize:12,fontWeight:600,color:MG,marginBottom:5,
                textTransform:"uppercase",letterSpacing:".04em"}}>
                Campaign content and key messages
              </div>
              <TA value={data.ac41_content} onChange={upd("ac41_content")} rows={8}
                ph="Describe the content of your campaign in detail. What evidence and facts will you use? What is your key message? What call to action will you give your audience? How have you tailored the content to your target audience?…"
                disabled={am} recordings={data.recordings?.ac41_content||[]}
                onAddRecording={updRec("ac41_content")}/>
              <div style={{background:AMBER_LT,border:`1px solid ${AMBER}`,borderRadius:5,
                padding:"7px 11px",fontSize:12,color:"#92400e",marginTop:8}}>
                Upload campaign materials (poster, video, slides, leaflet) in the Photo &amp; Audio Evidence section and mark them as evidence for AC 4.1.
              </div>
              {am&&<ACStatus id="4.1" status={acStatus("4.1")} onChange={v=>setACStatus("4.1",v)}/>}
            </ACQ>

            <ACQ ac="4.2" am={am} label="Reflect on the impact of your campaign. Use a structured reflection approach.">
              <Hint text="A strong Level 3 reflection goes beyond 'it went well'. Use Gibbs Reflective Cycle (or similar) to analyse what happened, why, and what you would do differently. Include any evidence of impact you collected (audience feedback, reach, behaviour change). Minimum expectation: evaluation and analysis stages, not just description."/>
              <TA value={data.ac42_text} onChange={upd("ac42_text")} rows={9}
                ph="Description — What happened during the campaign delivery?&#10;&#10;Feelings — How did you feel?&#10;&#10;Evaluation — What worked well? What did not?&#10;&#10;Analysis — Why did certain elements succeed or not?&#10;&#10;Conclusion — What could have been done differently?&#10;&#10;Action plan — What would you change next time?"
                disabled={am} recordings={data.recordings?.ac42_text||[]}
                onAddRecording={updRec("ac42_text")}/>
              {am&&<ACStatus id="4.2" status={acStatus("4.2")} onChange={v=>setACStatus("4.2",v)}/>}
            </ACQ>

            {/* Assessor overall result */}
            {am&&(
              <div style={{background:ASSESSOR_LT,border:`1.5px solid ${ASSESSOR_BD}`,
                borderRadius:8,padding:"16px 18px",marginTop:16}}>
                <div style={{fontWeight:700,color:ASSESSOR_BG,fontSize:14,marginBottom:10,
                  textTransform:"uppercase",letterSpacing:".05em"}}>Overall Result</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
                  {["DISTINCTION","MERIT","PASS","REFER","PENDING"].map(v=>(
                    <button key={v} onClick={()=>update({overall_result:v})}
                      style={{padding:"6px 14px",border:`2px solid ${data.overall_result===v?(resultColour[v]||MG):BD}`,
                        borderRadius:20,fontSize:12,fontWeight:700,cursor:"pointer",
                        background:data.overall_result===v?(v==="REFER"?RED_LT:v==="PENDING"?"#f5f5f3":LG):"#fff",
                        color:data.overall_result===v?(resultColour[v]||MG):MG}}>
                      {v}
                    </button>
                  ))}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  <Inp label="Assessor signature" value={data.assessorSig}
                    onChange={upd("assessorSig")} ph="Assessor name" disabled={false}/>
                  <Inp label="Date marked" value={data.markedDate}
                    onChange={upd("markedDate")} type="date" disabled={false}/>
                </div>
              </div>
            )}
            <AssessorFeedback label="LO 4 — Raising Awareness" value={loFb("lo4")} onChange={v=>setLOFeedback("lo4",v)} assessorMode={am}/>
            {!am&&<ContinueBtn label="Continue to Photo Evidence →" onClick={()=>setSec("evidence")}/>}
          </div>
        )}

        {/* ── EVIDENCE ── */}
        {sec==="evidence"&&(
          <div className="wb-section">
            <h2 style={{color:G,fontWeight:700,fontSize:20,marginBottom:6,
              borderBottom:`2px solid ${G}`,paddingBottom:8}}>Photo &amp; Audio Evidence</h2>
            <p style={{fontSize:13,color:MG,marginBottom:16}}>
              Upload photos and audio recordings to support your assessment — especially campaign materials for AC 4.1.
            </p>
            <EvidenceSection data={data} update={update} am={am}
              acStatus={acStatus} setACStatus={setACStatus}/>
            {!am&&<ContinueBtn label="Continue to Checklist →" onClick={()=>setSec("checklist")}/>}
          </div>
        )}

        {/* ── CHECKLIST ── */}
        {sec==="checklist"&&(
          <div className="wb-section">
            <h2 style={{color:G,fontWeight:700,fontSize:20,marginBottom:16,
              borderBottom:`2px solid ${G}`,paddingBottom:8}}>Assessment Checklist &amp; Declaration</h2>
            {EV_LOS.map(lo=>(
              <div key={lo.id} style={{marginBottom:14,background:"#fff",borderRadius:8,
                border:`1.5px solid ${BD}`,padding:"12px 16px"}}>
                <div style={{fontWeight:700,fontSize:14,color:G,marginBottom:8}}>{lo.title}</div>
                {lo.acs.map(ac=>{
                  const checked=!!(data.checklist||{})[ac];
                  return(
                    <label key={ac} style={{display:"flex",alignItems:"center",gap:8,
                      marginBottom:6,cursor:am?"default":"pointer",fontSize:13}}>
                      <input type="checkbox" checked={checked} disabled={am}
                        onChange={e=>update({checklist:{...(data.checklist||{}),[ac]:e.target.checked}})}
                        style={{accentColor:G,width:15,height:15}}/>
                      <span style={{color:checked?G:"#1a1a1a"}}>
                        AC {ac} — {checked?"Complete ✓":"Not yet completed"}
                      </span>
                    </label>
                  );
                })}
              </div>
            ))}
            <div style={{background:"#fff",border:`1.5px solid ${BD}`,borderRadius:8,
              padding:"16px 18px",marginTop:16}}>
              <div style={{fontWeight:700,fontSize:14,color:G,marginBottom:10}}>Student Declaration</div>
              <p style={{fontSize:13,color:"#333",marginBottom:12,lineHeight:1.6}}>
                I confirm that the work submitted in this workbook is my own, produced without unauthorised assistance, and that I have referenced all sources used.
              </p>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <Inp label="Student signature" value={data.studentSig}
                  onChange={upd("studentSig")} ph="Type your full name to sign" disabled={am}/>
                <Inp label="Date" value={data.declarationDate}
                  onChange={upd("declarationDate")} type="date" disabled={am}/>
              </div>
            </div>
          </div>
        )}

        {/* ── GLOSSARY ── */}
        {sec==="glossary"&&(
          <div className="wb-section">
            <h2 style={{color:G,fontWeight:700,fontSize:20,marginBottom:16,
              borderBottom:`2px solid ${G}`,paddingBottom:8}}>Glossary</h2>
            <table className="data-tbl">
              <thead><tr><th style={{width:"28%"}}>Term</th><th>Definition</th></tr></thead>
              <tbody>
                {[
                  ["Biodiversity","The variety of living species (plants, animals, fungi, microorganisms) within a particular habitat, ecosystem, or the entire planet."],
                  ["Biotic","The living components of an ecosystem — organisms such as plants, animals, fungi and bacteria."],
                  ["Abiotic","The non-living components of an ecosystem — including temperature, rainfall, sunlight, soil type and water chemistry."],
                  ["Carbon footprint","The total amount of greenhouse gases (measured in CO₂ equivalent) produced directly and indirectly by an activity, person, event or organisation."],
                  ["Carbon zero / Net zero","A state in which the amount of greenhouse gas emitted equals the amount removed from the atmosphere, resulting in no net addition to atmospheric CO₂."],
                  ["Carbon neutral","Balancing carbon emissions through offsetting schemes rather than eliminating emissions at source — a weaker standard than net zero."],
                  ["Carbon offset","A reduction in greenhouse gas emissions (e.g. by planting trees or funding renewable energy) used to compensate for emissions elsewhere."],
                  ["CRoW Act 2000","The Countryside and Rights of Way Act 2000 — establishes the right to roam on open access land and strengthens SSSI protection in England and Wales."],
                  ["Ecological network","A system of connected habitats that allows species to move between areas; the Environment (Wales) Act 2016 requires the creation of a Resilient Ecological Network."],
                  ["Ecosystem","A community of living organisms (biotic) interacting with each other and their non-living environment (abiotic) as a functional system."],
                  ["Environmental responsibility","Acting in ways that minimise harm to the natural environment and actively preserve it for future generations."],
                  ["Invasive species","A species introduced (deliberately or accidentally) outside its natural range that causes harm to native species, habitats or human activities."],
                  ["Leave No Trace (LNT)","A framework of seven principles designed to minimise the environmental impact of outdoor recreation."],
                  ["Natural Resources Wales (NRW)","The body responsible for managing and protecting Wales's natural environment, created in 2013 by merging the Countryside Council for Wales, Environment Agency Wales and Forestry Commission Wales."],
                  ["SSSI","Site of Special Scientific Interest — a legal designation protecting areas of England or Wales of special interest for their wildlife or geology."],
                  ["Adaptation","A physical or behavioural characteristic that improves an organism's ability to survive and reproduce in its particular habitat."],
                  ["Resilient Ecological Network","A concept introduced by the Environment (Wales) Act 2016, describing a connected network of habitats that allows biodiversity to thrive and recover from pressures like climate change."],
                  ["Greenhouse gas","A gas (e.g. CO₂, methane, nitrous oxide) that absorbs and re-emits infrared radiation, contributing to the greenhouse effect and climate change."],
                  ["Food web","A network of feeding relationships within an ecosystem, showing how energy and nutrients pass between organisms."],
                  ["Trophic level","A position in a food chain or web, defined by the organism's source of energy (e.g. producer, primary consumer, secondary consumer)."],
                ].map(([t,d],i)=>(
                  <tr key={i}><td style={{fontWeight:600,fontSize:13,color:G}}>{t}</td>
                  <td style={{fontSize:13,lineHeight:1.55}}>{d}</td></tr>
                ))}
              </tbody>
            </table>
          </div>
        )}

      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
